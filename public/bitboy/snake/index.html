<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SNAKE</title>
<style>
  html,body{margin:0;height:100%;background:#0d1b2a;overflow:hidden}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="/arcade-leaderboard.js?v=2"></script>
<script>
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const COLS = 16, ROWS = 14;
  let cell = 10;
  const lbActive = () => window.ArcadeLB && ArcadeLB.active;
  const points = () => score * 10;
  try { window.ArcadeLB && ArcadeLB.refresh('snake'); } catch(e){}

  function fit(){
    const w = cv.clientWidth, h = cv.clientHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = w * dpr; cv.height = h * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cell = Math.min(w / COLS, h / ROWS);
  }
  window.addEventListener('resize', fit); fit();

  let snake, dir, next, food, score, dead, tick;
  function reset(){
    snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
    dir = {x:1,y:0}; next = {x:1,y:0};
    score = 0; dead = false; tick = 0;
    placeFood();
  }
  function placeFood(){
    // deterministic-ish spawn based on frame + score (no Math.random reliance needed)
    let tries = 0, x, y;
    do {
      x = (7 + score*3 + tries*5 + snake.length*2) % COLS;
      y = (3 + score*2 + tries*7) % ROWS;
      tries++;
    } while (snake.some(s=>s.x===x&&s.y===y) && tries<200);
    food = {x,y};
  }
  reset();

  document.addEventListener('keydown', (e)=>{
    const k = e.key;
    if(lbActive()) return;
    if(dead && (k==='Enter'||k===' '||k==='z'||k==='x')){ reset(); return; }
    if((k==='ArrowUp')    && dir.y===0) next={x:0,y:-1};
    if((k==='ArrowDown')  && dir.y===0) next={x:0,y:1};
    if((k==='ArrowLeft')  && dir.x===0) next={x:-1,y:0};
    if((k==='ArrowRight') && dir.x===0) next={x:1,y:0};
  });

  let acc = 0, last = 0;
  const STEP = 130;
  function loop(t){
    requestAnimationFrame(loop);
    if(!last) last = t;
    acc += t - last; last = t;
    if(acc >= STEP){ acc = 0; if(!dead) step(); }
    draw();
  }
  function step(){
    dir = next;
    const head = {x:(snake[0].x+dir.x+COLS)%COLS, y:(snake[0].y+dir.y+ROWS)%ROWS};
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){ dead = true;
      if(window.ArcadeLB) ArcadeLB.report('snake', points());
      return;
    }
    snake.unshift(head);
    if(head.x===food.x && head.y===food.y){ score++; placeFood(); }
    else snake.pop();
  }
  function draw(){
    const w = cv.clientWidth, h = cv.clientHeight;
    const ox = (w - COLS*cell)/2, oy = (h - ROWS*cell)/2;
    ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0,0,w,h);
    // faint grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(ox+i*cell,oy);ctx.lineTo(ox+i*cell,oy+ROWS*cell);ctx.stroke();}
    for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(ox,oy+j*cell);ctx.lineTo(ox+COLS*cell,oy+j*cell);ctx.stroke();}
    // food
    ctx.fillStyle = '#ff5d5d';
    ctx.fillRect(ox+food.x*cell+2, oy+food.y*cell+2, cell-4, cell-4);
    // snake
    snake.forEach((s,i)=>{
      ctx.fillStyle = i===0 ? '#9dffb0' : '#57e389';
      ctx.fillRect(ox+s.x*cell+1, oy+s.y*cell+1, cell-2, cell-2);
    });
    // score
    ctx.fillStyle = '#cfe8ff';
    ctx.font = Math.round(cell*0.9)+'px monospace';
    ctx.textBaseline = 'top';
    ctx.fillText(String(score).padStart(3,'0'), ox+2, 2);
    if(dead){
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle = '#ff8a8a'; ctx.textAlign='center';
      ctx.font = 'bold '+Math.round(cell*1.4)+'px monospace';
      ctx.fillText('GAME OVER', w/2, h/2 - cell*1.5);
      ctx.fillStyle = '#cfe8ff'; ctx.font = Math.round(cell*0.9)+'px monospace';
      ctx.fillText('PRESS  A', w/2, h/2 + cell*0.5);
      const hi = window.ArcadeLB && ArcadeLB.top('snake',1)[0];
      if(hi){ ctx.fillStyle='#9dffb0'; ctx.font=Math.round(cell*0.8)+'px monospace';
        ctx.fillText('HI '+String(hi.score).padStart(5,'0')+' '+hi.tag, w/2, h/2 + cell*1.8); }
      ctx.textAlign='left';
    }
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
