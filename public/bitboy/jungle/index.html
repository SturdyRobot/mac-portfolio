<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JUNGLE RUN</title>
<style>
  html,body{margin:0;height:100%;background:#0b1f16;overflow:hidden}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// ── virtual resolution (matches the LCD's ~16:14 aspect) ──
const VW = 164, VH = 144;
const GROUND = 116;      // ground surface y
const PW = 9, PH = 15;   // player size

function fit(){
  const w = cv.clientWidth, h = cv.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  cv.width = w*dpr; cv.height = h*dpr;
  ctx.setTransform((w/VW)*dpr, 0, 0, (h/VH)*dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fit); fit();

// ── input ──
const keys = {};
function isJump(k){ return k==='ArrowUp'||k==='Enter'||k===' '||k==='z'||k==='x'; }
addEventListener('keydown', e=>{
  keys[e.key] = true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if(state==='title' && (e.key==='Enter'||e.key===' '||e.key==='x')) start(1,0,3);
  else if(state==='over' && (e.key==='Enter'||e.key===' '||e.key==='x')) start(1,0,3);
});
addEventListener('keyup', e=>{ keys[e.key]=false; });

// ── game state ──
let state='title';          // title | play | clear | over
let level, score, lives, timeLeft, level_t;
let player, cameraX, lvl, banner, blink;

// simple seeded-ish RNG isn't needed — plain Math.random per level = fresh RNG each time
function genLevel(n){
  const length = 1200 + n*360;
  const pits=[], logs=[], scorps=[], golds=[];
  const maxPit = 20 + Math.min(16, n*2);
  let x = 190;
  while(x < length - 170){
    const gap = Math.max(34, 78 - n*4) + Math.random()*46;
    const r = Math.random();
    if(r < 0.34){                       // PIT
      const w = 16 + Math.random()*(maxPit-16);
      pits.push({x0:x, x1:x+w});
      if(Math.random()<0.45) golds.push({x:x+w/2-4, y:GROUND-34, r:5, got:false});
      x += w + gap;
    } else if(r < 0.58){                // LOG
      logs.push({x:x, spin:Math.random()*7});
      x += 16 + gap;
    } else if(r < 0.80){                // SCORPION
      const span = 16 + Math.random()*18;
      scorps.push({cx:x, span, x:x, dir:1, v:0.35 + n*0.04});
      x += span + gap;
    } else {                            // GOLD run
      const cnt = 1 + (Math.random()*3|0);
      for(let i=0;i<cnt;i++) golds.push({x:x+i*13, y:GROUND-13, r:5, got:false});
      x += cnt*13 + gap;
    }
  }
  return {length, pits, logs, scorps, golds, exit:length-46};
}

function isGap(wx){
  for(const p of lvl.pits) if(wx>=p.x0 && wx<=p.x1) return true;
  return false;
}

function start(n, sc, lv){
  level=n; score=sc; lives=lv;
  lvl = genLevel(n);
  spawn(40);
  timeLeft = 45 + n*3; level_t = 0;
  banner = 0; state='play';
}
function spawn(x){
  player = {x, y:GROUND-PH, vx:0, vy:0, onGround:true, face:1, safeX:x, run:0};
  blink = 70; // brief invulnerability
}
function nextLevel(){ start(level+1, score, lives); banner=90; }
function die(){
  lives--;
  if(lives<=0){ state='over'; return; }
  spawn(Math.max(40, player.safeX-14));
}

// ── update ──
const STEP=1/60; let acc=0, last=0;
function loop(t){
  requestAnimationFrame(loop);
  if(!last) last=t;
  acc += Math.min(0.05, (t-last)/1000); last=t;
  while(acc>=STEP){ acc-=STEP; if(state==='play') tick(); }
  draw();
}
function tick(){
  const p=player;
  level_t += STEP;
  timeLeft -= STEP;
  if(timeLeft<=0){ timeLeft=0; die(); return; }
  if(blink>0) blink--;
  if(banner>0) banner--;

  // horizontal
  const run = 1.35;
  if(keys['ArrowLeft'])  { p.vx=-run; p.face=-1; }
  else if(keys['ArrowRight']){ p.vx=run; p.face=1; }
  else p.vx=0;
  p.x += p.vx;
  if(p.x<0) p.x=0;
  if(p.vx!==0) p.run += 0.25;

  // jump
  const jump = isJump && (keys['ArrowUp']||keys['Enter']||keys[' ']||keys['z']||keys['x']);
  if(jump && p.onGround){ p.vy=-3.5; p.onGround=false; }

  // gravity
  p.vy += 0.22; p.y += p.vy;

  // ground / pit
  const feetX = p.x + PW/2;
  const overGap = isGap(feetX);
  if(!overGap && p.y+PH >= GROUND && p.vy>=0){
    p.y = GROUND-PH; p.vy=0; p.onGround=true; p.safeX=p.x;
  } else {
    p.onGround=false;
  }
  if(p.y > VH+16){ die(); return; }   // fell in a pit

  // logs (jump over; contact = trip)
  for(const l of lvl.logs){
    if(blink<=0 && aabb(p.x,p.y,PW,PH, l.x-6,GROUND-9,12,9)){ die(); return; }
    l.spin += 0.2;
  }
  // scorpions
  for(const s of lvl.scorps){
    s.x += s.v*s.dir;
    if(s.x > s.cx + s.span){ s.x=s.cx+s.span; s.dir=-1; }
    if(s.x < s.cx - s.span){ s.x=s.cx-s.span; s.dir=1; }
    if(blink<=0 && aabb(p.x,p.y,PW,PH, s.x-5,GROUND-7,10,7)){ die(); return; }
  }
  // gold
  for(const g of lvl.golds){
    if(!g.got && aabb(p.x,p.y,PW,PH, g.x,g.y,9,9)){ g.got=true; score+=100; }
  }
  // reached exit
  if(p.x > lvl.exit){ state='clear'; banner=70; }

  // camera
  cameraX = Math.max(0, Math.min(lvl.length-VW, p.x - VW*0.4));
}
function aabb(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ── draw ──
function draw(){
  // sky
  const g = ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,'#153a29'); g.addColorStop(1,'#0a1c14');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);

  if(state==='title'){ titleScreen(); return; }

  ctx.save();
  ctx.translate(-Math.round(cameraX),0);

  // parallax trees
  drawTrees();

  // ground strip
  const cLeft = cameraX-10, cRight = cameraX+VW+10;
  ctx.fillStyle='#5a3a1e';
  ctx.fillRect(cLeft, GROUND, cRight-cLeft, VH-GROUND);
  ctx.fillStyle='#3fa35a';
  ctx.fillRect(cLeft, GROUND, cRight-cLeft, 3);
  // dirt speckle
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let x=Math.floor(cLeft/12)*12; x<cRight; x+=12) ctx.fillRect(x, GROUND+8, 3, 3);

  // pits (punch holes)
  for(const p of lvl.pits){
    ctx.fillStyle='#0a1c14'; ctx.fillRect(p.x0, GROUND, p.x1-p.x0, VH-GROUND);
    ctx.fillStyle='#241a10';
    ctx.fillRect(p.x0-2, GROUND, 2, VH-GROUND);
    ctx.fillRect(p.x1, GROUND, 2, VH-GROUND);
  }

  // gold
  for(const g of lvl.golds){ if(g.got) continue;
    ctx.fillStyle='#ffd23f'; ctx.fillRect(g.x, g.y, 9, 6);
    ctx.fillStyle='#c99a12'; ctx.fillRect(g.x, g.y+6, 9, 2);
    ctx.fillStyle='#fff2b0'; ctx.fillRect(g.x+1, g.y+1, 3, 1);
  }

  // logs
  for(const l of lvl.logs) drawLog(l.x, GROUND-9, l.spin);
  // scorpions
  for(const s of lvl.scorps) drawScorpion(s.x, GROUND-7, s.dir);
  // exit flag
  drawFlag(lvl.exit, GROUND);

  // player
  drawPlayer();

  ctx.restore();

  // HUD + overlays (screen space)
  hud();
  if(banner>0 && state==='play'){ centerText('LEVEL '+level, '#ffd23f'); }
  if(state==='clear') centerText('LEVEL CLEAR', '#7bd88f', ()=>{ if(banner<=0) nextLevel(); });
  if(state==='over')  centerText('GAME OVER', '#ff7a7a', null, 'PRESS  A');
}

function drawPlayer(){
  const p=player;
  if(blink>0 && (Math.floor(blink/4)%2)) return; // blink while invuln
  const x=Math.round(p.x), y=Math.round(p.y), f=p.face;
  // legs
  ctx.fillStyle='#2b3a66';
  const stepA = (!p.onGround) ? 2 : (Math.floor(p.run)%2? 3 : -1);
  ctx.fillRect(x+1, y+11, 3, 4);
  ctx.fillRect(x+5, y+11, 3, 4);
  if(p.onGround && p.vx!==0){ ctx.fillRect(x+1+stepA, y+13, 3, 2); }
  // torso (green shirt)
  ctx.fillStyle='#2ec07a'; ctx.fillRect(x+1, y+6, 7, 6);
  // arms
  ctx.fillStyle='#e6b58c'; ctx.fillRect(f>0? x+7 : x-0, y+6, 2, 4);
  // head
  ctx.fillStyle='#e6b58c'; ctx.fillRect(x+2, y, 5, 6);
  // hair
  ctx.fillStyle='#3a2a18'; ctx.fillRect(x+2, y, 5, 2);
  // eye
  ctx.fillStyle='#12241a'; ctx.fillRect(f>0? x+5 : x+2, y+3, 1, 1);
}
function drawLog(x,y,spin){
  ctx.fillStyle='#8a5a2a'; ctx.fillRect(x-6, y, 12, 9);
  ctx.fillStyle='#6b4420'; ctx.fillRect(x-6, y, 12, 2);
  // rolling rings
  ctx.fillStyle='#c98a4a';
  const o = Math.floor(spin)%4 - 2;
  ctx.fillRect(x-4+o, y+3, 2, 3); ctx.fillRect(x+2+o, y+3, 2, 3);
}
function drawScorpion(x,y,dir){
  ctx.fillStyle='#c0392b';
  ctx.fillRect(x-5, y+3, 10, 3);       // body
  ctx.fillRect(x-2, y, 3, 4);          // tail up
  ctx.fillStyle='#7a1f16';
  ctx.fillRect(x+ (dir>0?4:-6), y+2, 2, 2); // claw
  // legs
  ctx.fillStyle='#7a1f16';
  ctx.fillRect(x-4, y+6, 1, 2); ctx.fillRect(x-1, y+6, 1, 2); ctx.fillRect(x+2, y+6, 1, 2);
}
function drawFlag(x,gy){
  ctx.fillStyle='#cfd6d0'; ctx.fillRect(x, gy-30, 2, 30);
  ctx.fillStyle='#ff5d5d'; ctx.fillRect(x+2, gy-30, 12, 8);
  ctx.fillStyle='#ffd23f'; ctx.fillRect(x+4, gy-28, 3, 3);
}
function drawTrees(){
  // canopy blobs + trunks with 0.5x parallax
  ctx.fillStyle='#1c4a33';
  const par = cameraX*0.5;
  for(let i=-1;i<VW/70+2;i++){
    const sx = cameraX + i*70 - par%70;
    ctx.beginPath(); ctx.arc(sx+30, 30, 22, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(sx+27, 30, 6, 74);
  }
}
function hud(){
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,VW,13);
  ctx.fillStyle='#dfffe0'; ctx.font='8px monospace'; ctx.textBaseline='top';
  ctx.fillText('L'+level, 3, 3);
  ctx.fillText('♥'.repeat(Math.max(0,lives)), 26, 3);
  ctx.fillText(String(score).padStart(5,'0'), 74, 3);
  ctx.fillStyle = timeLeft<10 ? '#ff7a7a' : '#dfffe0';
  ctx.fillText('T'+Math.ceil(timeLeft), 128, 3);
}
function centerText(msg, col, cb, sub){
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,VH/2-22,VW,44);
  ctx.fillStyle=col; ctx.font='bold 15px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(msg, VW/2, VH/2-4);
  if(sub){ ctx.fillStyle='#dfffe0'; ctx.font='8px monospace'; ctx.fillText(sub, VW/2, VH/2+12); }
  ctx.textAlign='left';
  if(cb) cb();
}
function titleScreen(){
  drawTrees();
  ctx.fillStyle='#5a3a1e'; ctx.fillRect(0,GROUND,VW,VH-GROUND);
  ctx.fillStyle='#3fa35a'; ctx.fillRect(0,GROUND,VW,3);
  ctx.fillStyle='#ffd23f'; ctx.font='bold 17px monospace'; ctx.textAlign='center';
  ctx.fillText('JUNGLE RUN', VW/2, 46);
  ctx.fillStyle='#7bd88f'; ctx.font='8px monospace';
  ctx.fillText('a pitfall tribute', VW/2, 62);
  ctx.fillStyle='#dfffe0'; ctx.font='9px monospace';
  ctx.fillText('D-PAD move   A jump', VW/2, 88);
  ctx.fillText('PRESS  A  TO  START', VW/2, 104);
  ctx.textAlign='left';
  // little hero standing
  const px=VW/2-4;
  player={x:px,y:GROUND-PH,face:1,onGround:true,vx:0,run:0}; blink=0;
  drawPlayer();
}
requestAnimationFrame(loop);
</script>
</body>
</html>
