<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raid Clicker</title>
<style>
  :root{
    --bg:#0d0f0c; --panel:#15180f; --panel2:#1c2014; --line:#2c3320;
    --text:#c7c9b6; --dim:#7d8268; --accent:#a3b545; --warn:#d98a2b;
    --danger:#c0392b; --gold:#d4a017; --good:#6fa84f;
    --tier-junk:#8a8a78; --tier-common:#cfd2bd; --tier-rare:#5b9bd5;
    --tier-epic:#a05bd5; --tier-legendary:#d4a017;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Courier New",ui-monospace,monospace;
    font-size:14px; line-height:1.4; overflow-x:hidden;
    background-image:radial-gradient(circle at 50% 0%, #1a1d12 0%, #0d0f0c 60%);
  }
  #app{max-width:960px; margin:0 auto; padding:14px; min-height:100%}
  h1,h2,h3{font-weight:bold; letter-spacing:1px; text-transform:uppercase}
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    border:1px solid var(--line); background:var(--panel);
    padding:10px 14px; margin-bottom:12px;
  }
  .brand{color:var(--accent); font-size:18px}
  .brand small{color:var(--dim); font-size:11px; display:block; letter-spacing:3px}
  .wallet{font-size:18px; color:var(--gold); text-align:right}
  .wallet small{color:var(--dim); font-size:10px; display:block; text-align:right}
  .grid{display:grid; gap:12px}
  .cols-2{grid-template-columns:1fr 1fr}
  .panel{border:1px solid var(--line); background:var(--panel); padding:12px}
  .panel h2{color:var(--accent); font-size:13px; border-bottom:1px solid var(--line);
    padding-bottom:6px; margin-bottom:10px; display:flex; justify-content:space-between}
  .muted{color:var(--dim)}
  button{
    font-family:inherit; font-size:13px; cursor:pointer; color:var(--text);
    background:var(--panel2); border:1px solid var(--line); padding:8px 12px;
    text-transform:uppercase; letter-spacing:1px; transition:.12s;
  }
  button:hover:not(:disabled){border-color:var(--accent); color:var(--accent)}
  button:disabled{opacity:.35; cursor:not-allowed}
  button.primary{background:var(--accent); color:#0d0f0c; border-color:var(--accent); font-weight:bold}
  button.primary:hover{filter:brightness(1.1)}
  button.danger{border-color:var(--danger); color:var(--danger)}
  button.danger:hover{background:var(--danger); color:#fff}
  button.sm{padding:4px 8px; font-size:11px}
  button.wide{width:100%}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .spread{display:flex; justify-content:space-between; align-items:center}
  .loc{
    border:1px solid var(--line); background:var(--panel2); padding:10px; margin-bottom:8px; cursor:pointer;
  }
  .loc:hover{border-color:var(--accent)}
  .loc .name{color:var(--text); font-weight:bold; font-size:15px}
  .bar{height:6px; background:#000; border:1px solid var(--line); position:relative; overflow:hidden}
  .bar>span{position:absolute; left:0; top:0; bottom:0; transition:width .15s}
  .pip{display:inline-block; width:9px; height:9px; border:1px solid var(--line); margin-right:2px}
  .pip.on{background:var(--warn); border-color:var(--warn)}
  .pip.on.hot{background:var(--danger); border-color:var(--danger)}
  .item{display:flex; justify-content:space-between; padding:3px 6px; border-bottom:1px solid #20241799; gap:8px}
  .item .v{color:var(--gold); white-space:nowrap}
  .tag{font-size:10px; padding:1px 5px; border:1px solid; text-transform:uppercase; white-space:nowrap}
  .feed{height:150px; overflow-y:auto; background:#0a0c08; border:1px solid var(--line); padding:6px; font-size:12px}
  .feed div{padding:1px 0}
  .stat{text-align:center; flex:1}
  .stat .big{font-size:22px; display:block}
  .stat .lab{font-size:10px; color:var(--dim); letter-spacing:1px}
  .overlay{
    position:fixed; inset:0; background:rgba(5,6,4,.92); z-index:50;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  .arena{
    position:relative; width:580px; max-width:94vw; height:400px; max-height:60vh;
    border:2px solid var(--danger); background:
      repeating-linear-gradient(0deg,#11140c,#11140c 24px,#0d0f0c 24px,#0d0f0c 48px);
    overflow:hidden; cursor:crosshair;
  }
  .target{
    position:absolute; border-radius:50%; border:2px solid; transform:translate(-50%,-50%);
    display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:bold;
    cursor:crosshair; user-select:none; text-align:center; line-height:1.05;
  }
  .target.head{background:#c0392b55; border-color:#e74c3c; color:#ffb3a7}
  .target.body{background:#27548a55; border-color:#5b9bd5; color:#bcdcff}
  .target.limb{background:#7d826855; border-color:#a3b545; color:#dfe6b8}
  .loot-drop{
    position:absolute; transform:translate(-50%,-50%); padding:6px 8px; border:2px solid var(--gold);
    background:#1c1505; color:var(--gold); cursor:pointer; font-size:11px; white-space:nowrap;
    animation:pulse 1s infinite;
  }
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 #d4a01788}50%{box-shadow:0 0 0 6px #d4a01700}}
  .crosshair-info{position:absolute; top:6px; left:8px; right:8px; display:flex; justify-content:space-between; font-size:12px; pointer-events:none}
  .flash{position:absolute; inset:0; background:var(--danger); opacity:0; pointer-events:none}
  .raider{border:1px solid var(--line); background:var(--panel2); padding:8px; margin-bottom:8px}
  .raider .nm{font-weight:bold; color:var(--text)}
  select{font-family:inherit; background:var(--panel2); color:var(--text); border:1px solid var(--line); padding:4px}
  .toast{position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:99;
    background:var(--panel); border:1px solid var(--accent); padding:8px 16px; color:var(--accent)}
  .hidden{display:none !important}
  .deathscreen{text-align:center}
  .deathscreen h1{color:var(--danger); font-size:42px; margin-bottom:10px}
  .scav-btn{width:100%; height:90px; font-size:20px; margin-top:8px}
  .blink{animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.3}}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(calc(var(--shake,5px)*-1),var(--shake,5px))}40%{transform:translate(var(--shake,5px),calc(var(--shake,5px)*-1))}60%{transform:translate(calc(var(--shake,5px)*-1),0)}80%{transform:translate(var(--shake,5px),var(--shake,5px))}}
  @keyframes critpop{0%{transform:translate(-50%,-50%) scale(.5)}50%{transform:translate(-50%,-90%) scale(1.4)}100%{transform:translate(-50%,-130%) scale(1);opacity:0}}
  ::-webkit-scrollbar{width:8px}
  ::-webkit-scrollbar-thumb{background:var(--line)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">RAID CLICKER<small>extract or die</small></div>
    <div class="row">
      <button id="mailBtn" onclick="openMail()" style="position:relative">📬<span id="mailbadge"></span></button>
      <div class="wallet"><span id="money">0</span> ₽<small><span id="keycount">0</span> 🔑 keycards</small></div>
    </div>
  </div>
  <div id="screen-hub"></div>
  <div id="screen-raid" class="hidden"></div>
</div>
<div id="overlay-root"></div>
<div id="toast-root"></div>

<script>
/* ============================================================
   RAID CLICKER  — gear / ammo / penetration build
   ============================================================ */
const $ = (id)=>document.getElementById(id);
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const pick=(arr)=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const fmt=(n)=>Math.round(n).toLocaleString();
function toast(msg,color){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  if(color){ t.style.borderColor=color; t.style.color=color; }
  $('toast-root').appendChild(t);
  setTimeout(()=>{ t.style.transition='.4s'; t.style.opacity='0'; },1400);
  setTimeout(()=>t.remove(),1900);
}
// inbox: persistent messages from raiders, traders, and the hideout
function addMail(from, subject, body, icon){
  G.mail.unshift({id:++mailUid, from, subject, body, icon:icon||'📨', t:Date.now(), read:false, open:false});
  if(G.mail.length>60) G.mail.length=60;
  if(typeof updateMailBadge==='function') updateMailBadge();
}
function unreadMail(){ return G.mail.filter(m=>!m.read).length; }
function summarizeHaul(items, mats){
  const by={}; let notable=[];
  for(const it of items){
    const k = it.kind==='loot'?'valuables':it.kind==='ammo'?'ammo stacks':it.kind==='weapon'?'weapons':it.kind==='armor'?'armor':it.kind==='helmet'?'helmets':it.kind==='backpack'?'backpacks':it.kind==='rig'?'rigs':it.kind==='med'?'meds':it.kind==='material'?'materials':it.kind==='key'?'keycards':'items';
    by[k]=(by[k]||0)+(it.count||1);
    if(it.tier==='legendary'||it.kind==='key') notable.push(it.name);
  }
  if(mats>0) by['materials']=(by['materials']||0)+mats;
  const parts=Object.entries(by).map(([k,n])=>`${n} ${k}`);
  let s = parts.length? parts.join(' · ') : 'nothing of note';
  if(notable.length) s += `<br><span style="color:var(--gold)">★ ${[...new Set(notable)].join(', ')}</span>`;
  return s;
}
function openMail(){
  const o=document.createElement('div'); o.className='overlay'; o.id='mail-ov';
  const list = G.mail.length? G.mail.map(m=>`
    <div class="loc" style="cursor:pointer;${m.read?'':'border-color:var(--accent)'}" onclick="toggleMail(${m.id})">
      <div class="spread"><div><b style="${m.read?'':'color:var(--accent)'}">${m.icon} ${m.from}</b>
        <span class="muted" style="font-size:11px"> — ${m.subject}</span></div>
        ${m.read?'':'<span class="tag" style="color:var(--accent);border-color:var(--accent)">NEW</span>'}</div>
      ${m.open?`<div class="muted" style="font-size:12px;margin-top:5px">${m.body}</div>`:''}
    </div>`).join('') : '<div class="muted">Inbox empty.</div>';
  o.innerHTML=`<div class="panel" style="width:560px;max-width:94vw;max-height:86vh;overflow:auto">
    <div class="spread"><h2 style="border:none;margin:0">📬 Inbox <span class="muted">${unreadMail()} unread</span></h2>
      <div class="row"><button class="sm" onclick="markAllRead()">Mark all read</button><button class="sm danger" onclick="clearMail()">Clear</button></div></div>
    <div style="margin-top:10px">${list}</div>
    <button class="wide primary" style="margin-top:12px" onclick="closeOv()">Close</button>
  </div>`;
  $('overlay-root').innerHTML=''; $('overlay-root').appendChild(o);
}
function toggleMail(id){ const m=G.mail.find(x=>x.id===id); if(m){ m.open=!m.open; m.read=true; } updateMailBadge(); openMail(); }
function markAllRead(){ G.mail.forEach(m=>m.read=true); updateMailBadge(); openMail(); }
function clearMail(){ G.mail=[]; updateMailBadge(); closeOv(); }

/* ============================================================
   PRESTIGE — season wipe → permanent Kappa Token upgrades
   ============================================================ */
const PRESTIGE_UP = [
  {id:'loot',   name:'Loot Find',       icon:'💎', per:0.05, unit:'% loot value',       max:20},
  {id:'income', name:'Fat Stacks',      icon:'💰', per:0.06, unit:'% money from sales', max:20},
  {id:'dmg',    name:'Steady Hands',    icon:'🎯', per:0.05, unit:'% weapon damage',    max:20},
  {id:'carry',  name:'Pack Mule',       icon:'🎒', per:2,    unit:' carry points',      max:20},
  {id:'crew',   name:'Crew Efficiency', icon:'🛏', per:0.06, unit:'% faster raiders',   max:8},
  {id:'market', name:'Black Market',    icon:'🤝', per:0.04, unit:'% cheaper prices',   max:10},
];
function presLvl(id){ return (G.prestige.up||{})[id]||0; }
function lootMult(){ return 1 + 0.05*presLvl('loot'); }
function incomeMult(){ return 1 + 0.06*presLvl('income'); }
function dmgMult(){ return 1 + 0.05*presLvl('dmg'); }
function carryBonus(){ return 2*presLvl('carry'); }
function raiderSpeedMult(){ return Math.max(0.4, 1 - 0.06*presLvl('crew')); }
function priceMult(){ return Math.max(0.5, 1 - 0.04*presLvl('market')); }
// net worth + accomplishments this season → drives token payout on wipe
function seasonScore(){
  let s=G.money + G.keys*BTC_VALUE;
  s += G.stash.reduce((a,i)=>a+(i.value||0),0);
  for(const k of ['weapons','armors','helmets','backpacks','rigs']) s += (G.arsenal[k]||[]).reduce((a,i)=>a+(i.value||0),0);
  for(const [n,c] of Object.entries(G.ammoStock)) s += (AMMO_BY_NAME[n]?.val||0)*c;
  for(const [n,c] of Object.entries(G.medStock)) s += (MED_BY_NAME[n]?.val||0)*c;
  for(const [n,c] of Object.entries(G.materials)) s += (MATERIAL_PRICE[n]||3000)*0.5*c;
  for(const m of MODULES){ const lvl=moduleLevel(m.id); for(let i=0;i<lvl;i++) s+=m.tiers[i].money; }
  for(const id in G.traders) s += (G.traders[id].exp||0)*800;
  s += G.stats.kills*4000 + G.stats.extracts*12000;
  return Math.round(s);
}
function prestigeGain(){ return Math.floor(Math.sqrt(seasonScore()/500000)); }   // 500k→1, 2M→2, 4.5M→3, 50M→10
function presCost(id){ return presLvl(id)+1; }   // tokens for the next level
function buyPrestige(id){
  const def=PRESTIGE_UP.find(u=>u.id===id), lvl=presLvl(id);
  if(lvl>=def.max) return toast('Maxed out','var(--warn)');
  const cost=presCost(id);
  if(G.prestige.tokens<cost) return toast('Not enough Kappa Tokens','var(--danger)');
  G.prestige.tokens-=cost; G.prestige.up[id]=lvl+1; toast(`${def.name} → L${lvl+1}`,'var(--gold)'); save(); openPrestige();
}
function doWipe(){
  const gain=prestigeGain();
  if(gain<1) return toast('Not enough progress to wipe — grow your net worth first','var(--danger)');
  if(!confirm(`WIPE THE SEASON?\n\nYou lose all money, gear, hideout, raiders and traders.\nYou KEEP your prestige and gain ${gain} Kappa Token${gain>1?'s':''}.\n\nProceed?`)) return;
  G.prestige.tokens+=gain; G.prestige.wipes++;
  resetSeason();
  toast(`Season wiped — +${gain} Kappa Tokens`,'var(--gold)');
  closeOv(); render();
}
function resetSeason(){
  G.money=9000; G.keys=0; G.stash=[];
  G.arsenal={weapons:[],armors:[],helmets:[],backpacks:[],rigs:[]};
  G.ammoStock={'9x18 PM gzh':64}; G.medStock={'Bandage':3,'Salewa':1}; G.gunLevels={};
  G.gear={weapons:[{...WPN_BY_NAME['Makarov PM']},null], ammos:['9x18 PM gzh',''], active:0,
    armor:{...ARMORS[0]}, helmet:{...HELMETS[0]}, backpack:{...BACKPACKS[0]}, rig:{...RIGS[0]}};
  G.raiders=[]; G.materials={};
  G.base={modules:{barracks:1,generator:0,workbench:0,medstation:0,intel:0,bitcoin:0}, builds:[], crafts:[], btc:0, btcLast:Date.now()};
  G.auto={scav:0,reload:0,loot:0,extract:0}; G.autoExtractRisk=40; G.lastScav=0; G._scav=null;
  G.stats={extracts:0,deaths:0,kills:0};
  G.traders={}; initTraders();
  G.progress=defaultProgress();
  G.raid=null;
  addMail('Terra Group', `Season ${G.prestige.wipes} begins`, `A fresh wipe. Your <b style="color:var(--gold)">${G.prestige.tokens} Kappa Tokens</b> and permanent upgrades carry over. Build it back bigger, PMC.`, '🔄');
}
function openPrestige(){
  const o=document.createElement('div'); o.className='overlay'; o.id='prestige-ov';
  const score=seasonScore(), gain=prestigeGain();
  const rows=PRESTIGE_UP.map(u=>{
    const lvl=presLvl(u.id), cost=presCost(u.id), maxed=lvl>=u.max;
    const amount = u.per<1? `+${Math.round(u.per*100*lvl)}${u.unit}` : `+${u.per*lvl}${u.unit}`;
    return `<div class="loc" style="cursor:default"><div class="spread">
      <div><b>${u.icon} ${u.name}</b> <span class="muted">L${lvl}/${u.max}</span>
        <div class="muted" style="font-size:11px">currently ${amount||'none'} · ${u.per<1?Math.round(u.per*100):u.per}${u.unit} per level</div></div>
      <div>${maxed?'<span class="tag" style="color:var(--good);border-color:var(--good)">MAX</span>'
        :`<button class="sm" onclick="buyPrestige('${u.id}')" ${G.prestige.tokens>=cost?'':'disabled'}>${cost} ⬡</button>`}</div>
    </div></div>`;
  }).join('');
  o.innerHTML=`<div class="panel" style="width:560px;max-width:94vw;max-height:88vh;overflow:auto">
    <div class="spread"><h2 style="border:none;margin:0">⬡ Prestige</h2><span style="color:var(--gold)">${G.prestige.tokens} Kappa Tokens</span></div>
    <div class="muted" style="font-size:12px;margin:4px 0 10px">Permanent upgrades that survive every wipe. Tokens are earned by wiping a season — the bigger your empire, the more you bank.</div>
    <div class="loc" style="border-color:var(--gold);cursor:default">
      <div class="spread"><div><b>Season net worth</b><div class="muted" style="font-size:11px">money + gear + hideout + rep + kills/extracts</div></div>
        <div style="text-align:right"><b style="color:var(--gold)">${fmt(score)} ₽</b></div></div>
      <div class="spread" style="margin-top:6px"><span class="muted">Wipe now to bank</span><b style="color:${gain>=1?'var(--good)':'var(--dim)'}">${gain} token${gain===1?'':'s'}</b></div>
      <button class="wide danger" style="margin-top:8px" onclick="doWipe()" ${gain>=1?'':'disabled'}>🔄 WIPE SEASON — bank ${gain} token${gain===1?'':'s'}</button>
      <div class="muted" style="font-size:10px;margin-top:3px;text-align:center">Season ${G.prestige.wipes+1} · ${G.prestige.wipes} wipes completed</div>
    </div>
    <h3 style="color:var(--accent);margin:12px 0 6px">Permanent Upgrades</h3>${rows}
    <button class="wide primary" style="margin-top:12px" onclick="closeOv()">Close</button>
  </div>`;
  $('overlay-root').innerHTML=''; $('overlay-root').appendChild(o);
}

/* ============================================================
   JUICE — sound, crits, screen shake, rarity flash
   ============================================================ */
let _ac=null;
function sfx(type){
  if(G.muted) return;
  try{
    _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
    const t=_ac.currentTime, o=_ac.createOscillator(), g=_ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    const P={click:[420,0.05,'square',0.06],hit:[200,0.07,'sawtooth',0.08],crit:[880,0.12,'square',0.12],
      kill:[140,0.18,'sawtooth',0.12],cash:[660,0.12,'sine',0.1],extract:[523,0.25,'sine',0.12],
      legendary:[990,0.4,'triangle',0.14],reload:[300,0.08,'square',0.06],err:[120,0.12,'square',0.08]}[type]||[440,0.06,'sine',0.06];
    o.type=P[2]; o.frequency.setValueAtTime(P[0],t);
    if(type==='extract'||type==='legendary') o.frequency.exponentialRampToValueAtTime(P[0]*2,t+P[1]);
    if(type==='kill') o.frequency.exponentialRampToValueAtTime(60,t+P[1]);
    g.gain.setValueAtTime(P[3],t); g.gain.exponentialRampToValueAtTime(0.0001,t+P[1]);
    o.start(t); o.stop(t+P[1]+0.02);
  }catch(e){}
}
function shake(sel, amt){ const el=document.querySelector(sel); if(!el)return; el.style.animation='none';
  requestAnimationFrame(()=>{ el.style.setProperty('--shake',(amt||5)+'px'); el.style.animation='shake .25s'; }); }
function rarityFlash(color){ const f=document.createElement('div'); f.style.cssText=`position:fixed;inset:0;background:${color};opacity:.32;pointer-events:none;z-index:80;transition:opacity .5s`;
  document.body.appendChild(f); requestAnimationFrame(()=>f.style.opacity='0'); setTimeout(()=>f.remove(),520); }
function bigBanner(text,color){ const b=document.createElement('div');
  b.style.cssText=`position:fixed;top:32%;left:50%;transform:translate(-50%,-50%) scale(.6);z-index:90;color:${color};font-size:30px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 12px ${color};pointer-events:none;transition:.4s;opacity:0`;
  b.textContent=text; document.body.appendChild(b);
  requestAnimationFrame(()=>{ b.style.opacity='1'; b.style.transform='translate(-50%,-50%) scale(1)'; });
  setTimeout(()=>{ b.style.opacity='0'; b.style.transform='translate(-50%,-60%) scale(1.1)'; },900); setTimeout(()=>b.remove(),1400); }
// celebrate notable loot
function juiceLoot(it){
  if(it.kind==='key'){ sfx('legendary'); rarityFlash('#d4a017'); bigBanner('★ KEYCARD ★','var(--gold)'); }
  else if(it.tier==='legendary'){ sfx('legendary'); rarityFlash('#d4a017'); bigBanner('LEGENDARY!','var(--gold)'); }
  else if(it.tier==='epic'){ sfx('cash'); rarityFlash('#a05bd5'); }
}
function toggleMute(){ G.muted=!G.muted; if(!G.muted)sfx('click'); save(); if(document.querySelector('.overlay'))openAuto(); }

/* ============================================================
   AUTOMATION — buyable upgrades that run the raid loop for you
   ============================================================ */
const AUTO_UP = [
  {id:'scav',    name:'Auto-Scavenge', icon:'🤖', desc:'A drone scavenges for you. Each level is faster.', max:8,  base:40000,  mul:1.7},
  {id:'reload',  name:'Auto-Reload',   icon:'🔄', desc:'Reloads automatically when your mag runs dry.',     max:1,  base:60000,  mul:1},
  {id:'loot',    name:'Auto-Loot',     icon:'🧲', desc:'Vacuums up loot drops after a kill.',               max:1,  base:90000,  mul:1},
  {id:'extract', name:'Auto-Extract',  icon:'🚁', desc:'Bugs out automatically when risk gets too high.',   max:1,  base:120000, mul:1},
];
function autoLvl(id){ return (G.auto||{})[id]||0; }
function autoCost(id){ const d=AUTO_UP.find(u=>u.id===id); return Math.round(d.base*Math.pow(d.mul,autoLvl(id))); }
function autoScavInterval(){ return Math.max(0.6, 2.6 - 0.28*autoLvl('scav')); }   // seconds between auto-scavs
function buyAuto(id){
  const d=AUTO_UP.find(u=>u.id===id), lvl=autoLvl(id);
  if(lvl>=d.max) return toast('Maxed','var(--warn)');
  const cost=autoCost(id); if(G.money<cost) return toast('Not enough roubles','var(--danger)');
  G.money-=cost; G.auto[id]=lvl+1; sfx('cash'); toast(`${d.name} ${d.max>1?'L'+(lvl+1):'enabled'}`,'var(--good)'); save(); openAuto();
}
function setAutoRisk(v){ G.autoExtractRisk=clamp(+v,10,90); save(); if(document.querySelector('.overlay'))openAuto(); }
function openAuto(){
  const o=document.createElement('div'); o.className='overlay'; o.id='auto-ov';
  const rows=AUTO_UP.map(u=>{
    const lvl=autoLvl(u.id), maxed=lvl>=u.max, cost=autoCost(u.id);
    const status = u.id==='scav'&&lvl>0? `every ${autoScavInterval().toFixed(1)}s` : lvl>0?'ON':'off';
    return `<div class="loc" style="cursor:default"><div class="spread">
      <div><b>${u.icon} ${u.name}</b> <span class="muted">${u.max>1?`L${lvl}/${u.max} · ${status}`:status}</span>
        <div class="muted" style="font-size:11px">${u.desc}</div></div>
      <div>${maxed?'<span class="tag" style="color:var(--good);border-color:var(--good)">'+(u.max>1?'MAX':'ON')+'</span>'
        :`<button class="sm" onclick="buyAuto('${u.id}')" ${G.money>=cost?'':'disabled'}>${fmt(cost)}₽</button>`}</div>
    </div>${u.id==='extract'&&lvl>0?`<div class="row" style="margin-top:6px"><span class="muted" style="font-size:11px">Bug out at risk ≥</span>
      <input type="range" min="10" max="90" value="${G.autoExtractRisk}" oninput="setAutoRisk(this.value)" style="flex:1"><b>${G.autoExtractRisk}%</b></div>`:''}</div>`;
  }).join('');
  o.innerHTML=`<div class="panel" style="width:560px;max-width:94vw;max-height:88vh;overflow:auto">
    <div class="spread"><h2 style="border:none;margin:0">⚙ Automation</h2>
      <button class="sm" onclick="toggleMute()">${G.muted?'🔇 Muted':'🔊 Sound'}</button></div>
    <div class="muted" style="font-size:12px;margin:4px 0 10px">Buy automation so raids run themselves — set it up, then watch the loot roll in.</div>
    ${rows}
    <button class="wide primary" style="margin-top:12px" onclick="closeOv()">Close</button>
  </div>`;
  $('overlay-root').innerHTML=''; $('overlay-root').appendChild(o);
}

function itemPoints(it){

  if(it.kind==='backpack') return 8;
  if(it.kind==='armor')    return 6;
  if(it.kind==='rig')      return 4;

  if(it.kind==='ammo'||it.kind==='med'||it.kind==='key') return 1;

  return ({junk:1,common:1,rare:2,epic:3,legendary:4})[it.tier]||1;
}

/* ---------- GUN LEVELS 1-6 (mastery improves the weapon) ---------- */
const GUN_THRESH = [4,12,25,45,75];   // kills needed to reach L2..L6
function gunKills(name){ return G.gunLevels[name]||0; }
function gunLevel(name){ let l=1; const k=gunKills(name); for(const t of GUN_THRESH){ if(k>=t) l++; else break; } return l; }
function gunNextThresh(name){ const l=gunLevel(name); return l>=6? null : GUN_THRESH[l-1]; }
function gunUpgradeCost(w){ const nl=gunLevel(w.name)+1; if(nl>6) return null; return Math.round((18000 + w.val*0.45) * nl); }
function upgradeGun(name){
  const w0=WPN_BY_NAME[name]; if(!w0) return;
  const nl=gunLevel(name)+1; if(nl>6) return toast('Already max level','var(--warn)');
  const cost=gunUpgradeCost(w0); if(G.money<cost) return toast('Not enough roubles','var(--danger)');
  G.money-=cost; G.gunLevels[name]=GUN_THRESH[nl-2];   // jump to the threshold for the new level
  toast(`${name} trained to L${nl}`,'var(--good)');
}
// apply level bonuses: more damage and better handling. Mag stays at the real-world capacity.
function effWeapon(w){
  if(!w) return w;
  const lvl=gunLevel(w.name);
  return {...w, level:lvl,
    dmgMod: w.dmgMod*(1+0.05*(lvl-1)),
    ergo:   w.ergo + 3*(lvl-1),
    mag:    weaponMag(w),
  };
}

// active weapon slot (0=primary, 1=secondary), with level bonuses applied
function activeWeapon(){ return G.gear.weapons[G.gear.active]; }
function activeEff(){ return effWeapon(activeWeapon()); }
function hasSecondary(){ return !!G.gear.weapons[1]; }
function currentAmmo(){
  const w=activeWeapon(); if(!w) return null;
  const a=AMMO_BY_NAME[G.gear.ammos[G.gear.active]];
  if(!a || a.cal!==w.cal) return null;
  return a;
}
function ammoCount(name){ return G.ammoStock[name]||0; }
function medCount(name){ return G.medStock[name]||0; }
// total carry capacity in points = backpack + tactical rig + pockets
function carryCapacity(){
  return (G.gear.backpack?G.gear.backpack.pts:0) + (G.gear.rig?G.gear.rig.pts:0) + POCKET_POINTS + carryBonus();
}
function carriedPoints(){ return G.raid? G.raid.carried.reduce((a,it)=>a+itemPoints(it),0) : 0; }
function ownedMeds(){ return MEDS.filter(m=>medCount(m.name)>0); }
function useMed(name){
  const m=MED_BY_NAME[name]; if(!m||medCount(name)<=0||!G.raid)return;
  if(G.raid.hp>=G.raid.maxHp && G.raid.bleed<=0) return toast('Already at full health','var(--warn)');
  G.medStock[name]--;
  G.raid.hp=Math.min(G.raid.maxHp, G.raid.hp+m.heal);
  if(m.cure>0) G.raid.bleed=Math.max(0, G.raid.bleed-m.cure);
  pushLog(`Used <b>${name}</b>${m.heal?` (+${m.heal} HP)`:''}${m.cure?' — bleeding treated':''}.`);
  toast(`Used ${name}`,'var(--good)');
  if(G.raid.combat) renderCombat(); else render();
}
function ownedAmmoForCaliber(cal){
  return (AMMO_BY_CAL[cal]||[]).filter(a=>ammoCount(a.name)>0);
}
function pickCompatibleAmmo(slot){
  slot = (slot==null)? G.gear.active : slot;
  const w=G.gear.weapons[slot]; if(!w){ G.gear.ammos[slot]=''; return; }
  const cur=AMMO_BY_NAME[G.gear.ammos[slot]];
  if(cur && cur.cal===w.cal && ammoCount(cur.name)>0) return;
  const owned=ownedAmmoForCaliber(w.cal);
  G.gear.ammos[slot] = owned.length? owned[0].name : '';
}
/* ---------- magazines (per weapon slot, loaded from your ammo reserve) ---------- */
function magCap(slot){ const w=G.gear.weapons[slot]; return w? effWeapon(w).mag : 0; }
function reloadSlot(s){
  const w=G.gear.weapons[s]; if(!w || !G.raid){ if(G.raid)G.raid.mag[s]=0; return 0; }
  const a=AMMO_BY_NAME[G.gear.ammos[s]];
  if(!a || a.cal!==w.cal){ G.raid.mag[s]=0; G.raid.magAmmo[s]=''; return 0; }
  const cap=effWeapon(w).mag, need=cap-G.raid.mag[s], avail=ammoCount(a.name);
  const load=Math.max(0, Math.min(need, avail));
  G.ammoStock[a.name]=avail-load; G.raid.mag[s]+=load; G.raid.magAmmo[s]=a.name;
  return load;
}
function loadAllMags(){ G.raid.mag=[0,0]; G.raid.magAmmo=['','']; reloadSlot(0); if(G.gear.weapons[1]) reloadSlot(1); }
// the ammo actually chambered in the active mag (for damage/pen)
function magAmmo(){ return AMMO_BY_NAME[G.raid? G.raid.magAmmo[G.gear.active] : '']||null; }
function reloadActive(){
  if(!G.raid||!G.raid.combat) return;
  const s=G.gear.active, before=G.raid.mag[s];
  const got=reloadSlot(s);
  if(got>0){ pushLog(`Reloaded — ${G.raid.mag[s]} rounds.`); }
  else if(G.raid.mag[s]===before){ toast('No reserve ammo for this gun','var(--danger)'); }
  renderCombat();
}
function switchWeapon(){
  if(!hasSecondary()||!G.raid) return;
  G.gear.active = G.gear.active===0?1:0;
  pushLog(`Switched to <b>${activeWeapon().name}</b>.`);
  if(G.raid.combat){ spawnTargets(); renderCombat(); } else render();
}
// Penetration: how much of a shot gets through armor of class `cls`.
function penFactor(pen, cls){
  if(!cls || cls<=0) return 1;
  const need = cls*9;                 // class6 wall ≈ 54 pen
  if(pen>=need) return 1;
  return clamp(Math.pow(pen/need, 1.7), 0.05, 1);
}

/* ============================================================
   SURVIVABILITY (whole loadout: armor + helmet + weapon + ammo)
   ============================================================ */
function loadoutMitigation(o={}){
  const weapon=o.weapon||activeEff()||{dmgMod:0.5};
  const armor =o.armor ||G.gear.armor;
  const helmet=o.helmet||G.gear.helmet;
  const ammo  =('ammo' in o)? o.ammo : currentAmmo();
  const armorMit  = 1 - clamp(armor.cls*0.10, 0, 0.60);
  const helmMit   = 1 - clamp(helmet.cls*0.05, 0, 0.30);
  const off = ammo ? (ammo.dmg*weapon.dmgMod*0.35 + ammo.pen*0.9) : 3;
  const offMit    = 1 - clamp(off/170, 0, 0.40);
  return clamp(armorMit*helmMit*offMit, 0.15, 1);
}
function survivalRating(o){ return Math.round((1-loadoutMitigation(o))*100); }
function survColor(r){ return r>=55?'var(--good)':r>=30?'var(--warn)':'var(--danger)'; }

/* ============================================================
   LOOT
   ============================================================ */
function rollTier(bias){
  const total=Object.values(bias).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const t of Object.keys(bias)){ r-=bias[t]; if(r<=0) return t; }
  return 'common';
}
function rollLoot(bias, depthBonus=0){
  const it=rollLootBase(bias, depthBonus);
  if(it && it.value) it.value=Math.round(it.value*lootMult());   // prestige Loot Find
  return it;
}
function rollLootBase(bias, depthBonus=0){
  const b={...bias};
  b.rare+=depthBonus*8; b.epic+=depthBonus*4; b.legendary+=depthBonus*1.5;
  const tier=rollTier(b);
  // rare keycard (only legendary-capable maps roll legendary)
  if(tier==='legendary' && Math.random()<0.07)
    return {kind:'key',name:'Labs Access Keycard',value:900000,tier:'legendary'};
  // meds drop sometimes on any tier
  if(Math.random()<0.10){
    const m=gearByLevel(MEDS, tier==='junk'?0.1:tier==='common'?0.35:0.7);
    return {kind:'med',name:m.name,count:1,value:m.val,tier:tier==='junk'?'common':tier};
  }
  // crafting materials drop (feed the base)
  if(Math.random()<0.16){
    const name=pick(MATERIALS), cnt=ri(1,3);
    return {kind:'material',name,count:cnt,value:Math.round((MATERIAL_PRICE[name]||3000)*0.5)*cnt,tier:tier==='junk'?'junk':'common'};
  }
  // gear / ammo drops on good tiers
  if((tier==='rare'||tier==='epic'||tier==='legendary') && Math.random()<0.30){
    const roll=Math.random();
    const lvl = tier==='rare'?0.45 : tier==='epic'?0.72 : 0.95;  // gear quality 0-1
    if(roll<0.30){ const w=gearByLevel(WEAPONS,lvl); return {kind:'weapon',name:w.name,value:w.val,tier,data:{...w}}; }
    if(roll<0.54){ const a=gearByLevel(ARMORS,lvl);  return {kind:'armor', name:a.name,value:a.val,tier,data:{...a}}; }
    if(roll<0.72){ const h=gearByLevel(HELMETS.slice(1),lvl); return {kind:'helmet',name:h.name,value:h.val,tier,data:{...h}}; }
    if(roll<0.78){ const p=gearByLevel(BACKPACKS,lvl); return {kind:'backpack',name:p.name,value:p.val,tier,data:{...p}}; }
    if(roll<0.84){ const rg=gearByLevel(RIGS,lvl); return {kind:'rig',name:rg.name,value:rg.val,tier,data:{...rg}}; }
    // ammo stack
    const am=gearByLevel(AMMO,lvl); const cnt=ri(20,50);
    return {kind:'ammo',name:am.name,count:cnt,value:am.val*cnt,tier};
  }
  const [name,base]=pick(LOOT[tier]);
  return {kind:'loot',name,value:Math.round(base*rnd(0.8,1.25)),tier};
}
// pick an item near a quality level (0=cheapest .. 1=best) from a value-sorted list
function gearByLevel(list,lvl){
  const sorted=[...list].sort((a,b)=>a.val-b.val);
  const idx=clamp(Math.round(lvl*(sorted.length-1))+ri(-1,1),0,sorted.length-1);
  return sorted[idx];
}
function routeLoot(it){
  if(it.kind==='weapon') G.arsenal.weapons.push(it);
  else if(it.kind==='armor') G.arsenal.armors.push(it);
  else if(it.kind==='helmet') G.arsenal.helmets.push(it);
  else if(it.kind==='backpack') G.arsenal.backpacks.push(it);
  else if(it.kind==='rig') G.arsenal.rigs.push(it);
  else if(it.kind==='ammo') G.ammoStock[it.name]=ammoCount(it.name)+it.count;
  else if(it.kind==='med') G.medStock[it.name]=medCount(it.name)+(it.count||1);
  else if(it.kind==='material') G.materials[it.name]=matCount(it.name)+(it.count||1);
  else if(it.kind==='key'){ G.keys++; G.progress.keysFound++; }
  else G.stash.push(it);
}

/* ============================================================
   BASE / HIDEOUT logic
   ============================================================ */
function matCount(name){ return G.materials[name]||0; }
function moduleLevel(id){ return G.base.modules[id]||0; }
function maxRaiders(){ return moduleLevel('barracks')*2; }
function intelLevel(){ return moduleLevel('intel'); }
function hasMats(mats){ return Object.entries(mats||{}).every(([m,n])=>matCount(m)>=n); }
function spendMats(mats){ for(const [m,n] of Object.entries(mats||{})) G.materials[m]=matCount(m)-n; }
function matsText(mats){ return Object.entries(mats||{}).map(([m,n])=>`<span style="${matCount(m)>=n?'':'color:var(--danger)'}">${n} ${m}</span>`).join(', ')||'—'; }
function buyMaterial(name){
  const c=Math.round(MATERIAL_PRICE[name]*priceMult()); if(G.money<c) return toast('Not enough roubles','var(--danger)');
  G.money-=c; G.materials[name]=matCount(name)+1; toast('Bought '+name,'var(--gold)'); openBase();
}
// build / upgrade a module to its next level
function buildReq(id){ const m=MODULE_BY_ID[id]; const lvl=moduleLevel(id); return m.tiers[lvl]; }   // null if maxed
function isBuilding(id){ return G.base.builds.some(b=>b.id===id); }
function reqMet(t){ return !t.req || Object.entries(t.req).every(([k,v])=>moduleLevel(k)>=v); }
function startBuild(id){
  const lvl=moduleLevel(id), m=MODULE_BY_ID[id], t=m.tiers[lvl];
  if(!t) return toast('Already max level','var(--warn)');
  if(isBuilding(id)) return;
  if(!reqMet(t)) return toast('Requires '+Object.entries(t.req).map(([k,v])=>MODULE_BY_ID[k].name+' L'+v).join(', '),'var(--danger)');
  if(G.money<t.money) return toast('Not enough roubles','var(--danger)');
  if(!hasMats(t.mats)) return toast('Missing materials','var(--danger)');
  G.money-=t.money; spendMats(t.mats);
  G.base.builds.push({id, toLevel:lvl+1, finishAt:Date.now()+t.time*1000, dur:t.time});
  toast(`${m.name} → L${lvl+1} under construction`,'var(--accent)'); openBase();
}
// crafting
function recipesFor(modId){ return RECIPES.filter(r=>r.mod===modId && moduleLevel(modId)>=r.lvl); }
function craftingIn(modId){ return G.base.crafts.find(c=>c.mod===modId); }
const MAX_QUEUE = 5;
function moduleJobs(mod){ return G.base.crafts.filter(c=>c.mod===mod); }
function activeCraft(mod){ return G.base.crafts.find(c=>c.mod===mod && c.finishAt); }
function startCraft(rid){
  const r=RECIPES.find(x=>x.id===rid); if(!r) return;
  if(moduleLevel(r.mod)<r.lvl) return;
  if(moduleJobs(r.mod).length>=MAX_QUEUE) return toast('Queue full ('+MAX_QUEUE+')','var(--warn)');
  if(G.money<r.money) return toast('Not enough roubles','var(--danger)');
  if(!hasMats(r.mats)) return toast('Missing materials','var(--danger)');
  G.money-=r.money; spendMats(r.mats);   // resources committed up front
  const busy=!!activeCraft(r.mod);
  G.base.crafts.push({uid:++craftUid, rid:r.id, mod:r.mod, dur:r.time, finishAt: busy? null : Date.now()+r.time*1000});
  toast((busy?'Queued ':'Crafting ')+r.name,'var(--accent)'); openBase();
}
function cancelCraft(uid){
  const c=G.base.crafts.find(x=>x.uid===uid); if(!c) return;
  const r=RECIPES.find(x=>x.id===c.rid);
  if(r){ G.money+=r.money; for(const [m,n] of Object.entries(r.mats||{})) G.materials[m]=matCount(m)+n; }   // refund
  const wasActive=!!c.finishAt;
  G.base.crafts=G.base.crafts.filter(x=>x!==c);
  if(wasActive){ const next=G.base.crafts.find(x=>x.mod===c.mod && !x.finishAt); if(next) next.finishAt=Date.now()+next.dur*1000; }
  toast('Cancelled '+(r?r.name:'craft')+' — refunded','var(--gold)'); openBase();
}
function claimBitcoin(){
  const lvl=moduleLevel('bitcoin'); if(lvl<1) return;
  const n=Math.floor(G.base.btc||0); if(n<1) return toast('No Bitcoin ready yet','var(--warn)');
  for(let i=0;i<n;i++) G.stash.push({kind:'loot',name:'Physical Bitcoin',value:BTC_VALUE,tier:'legendary'});
  G.base.btc=(G.base.btc||0)-n;
  toast(`Claimed ${n} Bitcoin → stash (${fmt(n*BTC_VALUE)}₽)`,'var(--gold)'); openBase();
}
// turn a recipe output into a routable inventory item
function craftItem(out){
  const k=out.kind;
  if(k==='ammo')   return {kind:'ammo',name:out.name,count:out.count,value:(AMMO_BY_NAME[out.name]?.val||0)*out.count,tier:'rare'};
  if(k==='med')    return {kind:'med',name:out.name,count:out.count,value:(MED_BY_NAME[out.name]?.val||0)*out.count,tier:'common'};
  if(k==='weapon') { const w=WPN_BY_NAME[out.name]; return {kind:'weapon',name:w.name,value:w.val,tier:'rare',data:{...w}}; }
  if(k==='armor')  { const a=ARMOR_BY_NAME[out.name]; return {kind:'armor',name:a.name,value:a.val,tier:'rare',data:{...a}}; }
  if(k==='helmet') { const h=HELMET_BY_NAME[out.name]; return {kind:'helmet',name:h.name,value:h.val,tier:'rare',data:{...h}}; }
  if(k==='backpack'){ const b=BACKPACK_BY_NAME[out.name]; return {kind:'backpack',name:b.name,value:b.val,tier:'rare',data:{...b}}; }
  if(k==='rig')    { const rg=RIG_BY_NAME[out.name]; return {kind:'rig',name:rg.name,value:rg.val,tier:'rare',data:{...rg}}; }
  if(k==='key')    return {kind:'key',name:out.name,value:900000,tier:'legendary'};
  return {kind:'loot',name:out.name,value:out.value||1000,tier:out.tier||'common'};
}
// process finished builds & crafts + Bitcoin accrual (called from tick)
function processBase(now){
  let changed=false;
  for(const b of [...G.base.builds]){ if(now>=b.finishAt){ G.base.modules[b.id]=b.toLevel; G.base.builds=G.base.builds.filter(x=>x!==b);
    toast(`${MODULE_BY_ID[b.id].name} reached L${b.toLevel}`,'var(--good)');
    addMail('Hideout', `${MODULE_BY_ID[b.id].name} ${b.toLevel===1?'built':'upgraded'}`, `Construction complete — <b>${MODULE_BY_ID[b.id].name}</b> is now <b>Level ${b.toLevel}</b>.`, MODULE_BY_ID[b.id].icon);
    changed=true; } }
  for(const c of [...G.base.crafts]){ if(c.finishAt && now>=c.finishAt){ const r=RECIPES.find(x=>x.id===c.rid);
    if(r){ const it=craftItem(r.out); routeLoot(it); if(it.kind==='key')G.progress.keysFound++; toast(`Crafted ${r.name}`,'var(--good)');
      addMail('Workshop', `Craft ready: ${r.name}`, `Your <b>${r.name}</b> finished at the ${MODULE_BY_ID[c.mod].name} and was added to your stash.`, '🔨'); }
    G.base.crafts=G.base.crafts.filter(x=>x!==c);
    const next=G.base.crafts.find(x=>x.mod===c.mod && !x.finishAt); if(next) next.finishAt=now+next.dur*1000;   // start next in queue
    changed=true; } }
  // Bitcoin Farm passive accrual (continuous — does not force re-render)
  const bl=moduleLevel('bitcoin');
  if(bl>0){ const last=G.base.btcLast||now; const dt=Math.max(0,(now-last)/1000); G.base.btcLast=now;
    const wasReady=Math.floor(G.base.btc||0);
    G.base.btc=Math.min(btcCap(bl), (G.base.btc||0)+btcRate(bl)*dt);
    if(Math.floor(G.base.btc)>wasReady) changed=true;   // a whole BTC became claimable → refresh
  } else G.base.btcLast=now;
  return changed;
}

/* ============================================================
   TRADER LEVELS + MISSIONS
   ============================================================ */
function snapProgress(id){
  return {kills:G.progress.kills, extracts:G.progress.extracts, keysFound:G.progress.keysFound,
    killsAt:{...G.progress.killsAt}, extractsAt:{...G.progress.extractsAt},
    spentAt:(G.traders[id]?G.traders[id].spent:0)};
}
function traderLevel(t){ let lvl=1; for(const r of LEVEL_REQ){ if(t.exp>=r.exp && t.spent>=r.spent) lvl=r.lvl; else break; } return lvl; }
function nextReq(t){ return LEVEL_REQ.find(r=>!(t.exp>=r.exp && t.spent>=r.spent)) || null; }
function currentMission(tr){ return tr.missions[G.traders[tr.id].idx]; }
function missionProgress(id,m){
  const t=G.traders[id], b=t.base||{};
  switch(m.type){
    case 'kills':      return G.progress.kills-(b.kills||0);
    case 'extracts':   return G.progress.extracts-(b.extracts||0);
    case 'killsAt':    return (G.progress.killsAt[m.loc]||0)-((b.killsAt&&b.killsAt[m.loc])||0);
    case 'extractsAt': return (G.progress.extractsAt[m.loc]||0)-((b.extractsAt&&b.extractsAt[m.loc])||0);
    case 'keys':       return G.progress.keysFound-(b.keysFound||0);
    case 'spend':      return Math.max(0,Math.round(t.spent-(b.spentAt||0)));
    case 'depth':      return G.progress.bestDepth>=m.target? m.target : Math.round(G.progress.bestDepth);
  }
  return 0;
}
function missionReady(id){
  const tr=TRADER_BY_ID[id], t=G.traders[id], m=tr.missions[t.idx];
  if(!m) return false;
  if(traderLevel(t) < (m.reqLevel||1)) return false;
  return missionProgress(id,m) >= m.target;
}
function anyMissionReady(){ return TRADERS.some(tr=>missionReady(tr.id)); }
function claimMission(id){
  if(!missionReady(id)) return;
  const tr=TRADER_BY_ID[id], t=G.traders[id], m=tr.missions[t.idx];
  const before=traderLevel(t);
  t.exp+=m.exp; G.money+=m.cash; t.idx++; t.base=snapProgress(id);
  toast(`Mission complete: +${m.exp} rep, +${fmt(m.cash)}₽`,'var(--good)');
  addMail(tr.name, `Task complete: ${m.name}`, `Good work. Reward: <b style="color:var(--gold)">+${fmt(m.cash)}₽</b> and +${m.exp} reputation.`, '✅');
  if(traderLevel(t)>before) addMail(tr.name, `Loyalty Level ${traderLevel(t)}`, `You've reached <b>LL${traderLevel(t)}</b> with me — new wares are unlocked.`, '⭐');
  openTraderPanel(id);
}
function traderBuy(id,cat,idx){
  const tr=TRADER_BY_ID[id], t=G.traders[id], lvl=traderLevel(t);
  const entry=tr.stock[cat][idx]; if(!entry || lvl<entry.ll) return;
  const w=resolveWare(cat,entry.n);
  const cost = Math.round((cat==='ammo'? w.val*30 : w.val)*priceMult());
  if(G.money<cost) return toast('Not enough roubles','var(--danger)');
  G.money-=cost; t.spent+=cost;
  if(cat==='weapons') G.arsenal.weapons.push({kind:'weapon',name:w.name,value:w.val,tier:'rare',data:{...w}});
  else if(cat==='armors') G.arsenal.armors.push({kind:'armor',name:w.name,value:w.val,tier:'rare',data:{...w}});
  else if(cat==='helmets') G.arsenal.helmets.push({kind:'helmet',name:w.name,value:w.val,tier:'rare',data:{...w}});
  else if(cat==='backpacks') G.arsenal.backpacks.push({kind:'backpack',name:w.name,value:w.val,tier:'rare',data:{...w}});
  else if(cat==='rigs') G.arsenal.rigs.push({kind:'rig',name:w.name,value:w.val,tier:'rare',data:{...w}});
  else if(cat==='meds') G.medStock[w.name]=medCount(w.name)+1;
  else G.ammoStock[w.name]=ammoCount(w.name)+30;
  toast('Bought '+(cat==='ammo'?'30× ':'')+w.name,'var(--gold)');
  if(traderLevel(t)>lvl) addMail(tr.name, `Loyalty Level ${traderLevel(t)}`, `Your spending earned you <b>LL${traderLevel(t)}</b> with me — new wares unlocked.`, '⭐');
  openTraderPanel(id);
}

function assignWeapon(i,slot){
  const w=G.arsenal.weapons[i]; if(!w)return;
  G.arsenal.weapons.splice(i,1);
  const old=G.gear.weapons[slot];
  if(old) G.arsenal.weapons.push({kind:'weapon',name:old.name,value:old.val,tier:'common',data:old});
  G.gear.weapons[slot]=w.data; pickCompatibleAmmo(slot);
  toast('Equipped '+w.data.name+(slot===0?' (primary)':' (secondary)'),'var(--accent)'); save(); reopenLoadout();
}
function unequipWeapon(slot){
  const old=G.gear.weapons[slot]; if(!old)return;
  if(slot===0){
    if(!G.gear.weapons[1]) return toast('You need at least one weapon','var(--warn)');
    // promote secondary to primary
    G.arsenal.weapons.push({kind:'weapon',name:old.name,value:old.val,tier:'common',data:old});
    G.gear.weapons[0]=G.gear.weapons[1]; G.gear.weapons[1]=null;
    G.gear.ammos[0]=G.gear.ammos[1]; G.gear.ammos[1]='';
  } else {
    G.arsenal.weapons.push({kind:'weapon',name:old.name,value:old.val,tier:'common',data:old});
    G.gear.weapons[1]=null; G.gear.ammos[1]='';
  }
  if(G.gear.active===1 && !G.gear.weapons[1]) G.gear.active=0;
  save(); reopenLoadout();
}

// one-click: load the best ammo you own for each gun, buying a stack of the best you can afford if low
function autoAmmo(){
  const STACK=60, KEEP=60;   // top up to ~60 rounds per gun
  let bought=[], loaded=[];
  for(let s=0;s<2;s++){
    const w=G.gear.weapons[s]; if(!w) continue;
    const cands=(AMMO_BY_CAL[w.cal]||[]).slice().sort((a,b)=>b.pen-a.pen);  // best penetration first
    if(!cands.length) continue;
    // already hold a full top-up of something good? just load the best-pen of those
    const stocked=cands.filter(a=>ammoCount(a.name)>=KEEP);
    if(stocked.length){ G.gear.ammos[s]=stocked[0].name; loaded.push(w.name+' → '+stocked[0].name); continue; }
    // otherwise buy a stack of the best ammo we can afford
    const affordable=cands.find(a=>G.money>=a.val*STACK);
    if(affordable){
      G.money-=affordable.val*STACK; G.ammoStock[affordable.name]=ammoCount(affordable.name)+STACK;
      G.gear.ammos[s]=affordable.name; bought.push(`${STACK}× ${affordable.name}`);
    } else {
      // can't afford a full stack — buy as much of the cheapest as possible, else load whatever's owned
      const cheap=cands.slice().sort((a,b)=>a.val-b.val)[0];
      const qty=Math.floor(G.money/cheap.val);
      if(qty>0){ const q=Math.min(STACK,qty); G.money-=cheap.val*q; G.ammoStock[cheap.name]=ammoCount(cheap.name)+q; G.gear.ammos[s]=cheap.name; bought.push(`${q}× ${cheap.name}`); }
      else { const owned=cands.find(a=>ammoCount(a.name)>0); if(owned){ G.gear.ammos[s]=owned.name; loaded.push(w.name+' → '+owned.name); } }
    }
  }
  if(bought.length) toast('Bought & loaded '+bought.join(', '),'var(--gold)');
  else if(loaded.length) toast('Loaded best ammo','var(--accent)');
  else toast('No ammo available','var(--danger)');
  save();
  if(document.querySelector('.overlay')) reopenLoadout(); else render();   // refresh loadout if open, else the hub
}

  const mRows=tr.missions.map((m,i)=>{
    const t2=G.traders[id];
    if(i<t2.idx) return `<div class="item"><span style="color:var(--good)">✓ ${m.name}</span><span class="muted">+${m.exp} rep</span></div>`;
    if(i>t2.idx) return `<div class="item"><span class="muted">🔒 ${m.name}</span><span class="muted">locked</span></div>`;
    // active
    const reqOk=lvl>=(m.reqLevel||1);
    const prog=reqOk?missionProgress(id,m):0;
    const done=prog>=m.target;
    const target = m.type==='spend'? `${fmt(prog)}/${fmt(m.target)}₽`
                 : m.type==='depth'? `${prog}/${m.target}m` : `${Math.min(prog,m.target)}/${m.target}`;
    const right = !reqOk? `<span class="tag" style="color:var(--warn);border-color:var(--warn)">Needs LL${m.reqLevel}</span>`
      : done? `<button class="primary sm blink" onclick="claimMission('${id}')">CLAIM</button>`
      : `<span class="muted">${target}</span>`;
    const pct=clamp(prog/m.target*100,0,100);
    return `<div class="loc" style="cursor:default;border-color:${done?'var(--good)':'var(--line)'}">
      <div class="spread"><b>${m.name}</b>${right}</div>
      <div class="muted" style="font-size:12px">${m.desc}</div>
      <div class="muted" style="font-size:11px;margin-top:2px">reward: +${m.exp} rep · +${fmt(m.cash)}₽</div>
      ${reqOk?`<div class="bar" style="margin-top:4px"><span style="width:${pct}%;background:${done?'var(--good)':'var(--accent)'}"></span></div>`:''}
    </div>`;
  }).join('');

  // wares
  const wareRow=(cat,e,i,extra)=>{
    const w=resolveWare(cat,e.n); const locked=lvl<e.ll;
    const cost=cat==='ammo'?w.val*30:w.val;
    const btn = locked? `<span class="tag" style="color:var(--dim)">🔒 LL${e.ll}</span>`
      : `<button class="sm" onclick="traderBuy('${id}','${cat}',${i})" ${G.money>=cost?'':'disabled'}>${cat==='ammo'?'×30 = ':''}${fmt(cost)} ₽</button>`;
    return `<div class="item" style="${locked?'opacity:.55':''}"><span>${w.name} <span class="muted">· ${extra(w)}</span></span>${btn}</div>`;
  };
  const wareSec=(cat,title,extra)=> (tr.stock[cat]&&tr.stock[cat].length)?
    `<h3 style="color:var(--accent);margin:12px 0 4px">${title}</h3>${tr.stock[cat].map((e,i)=>wareRow(cat,e,i,extra)).join('')}` : '';

  o.innerHTML=`<div class="panel" style="width:640px;max-width:94vw;max-height:88vh;overflow:auto">
    <div class="spread"><h2 style="border:none;margin:0">${tr.name} <span class="muted">LL ${lvl}/6</span></h2>
      <button class="sm" onclick="openTraderHub()">← traders</button></div>
    <div class="muted" style="font-size:12px">${tr.blurb}</div>
    ${lvlBlock}
    <h3 style="color:var(--accent);margin:14px 0 6px">📋 Missions</h3>${mRows}
    <h3 style="color:var(--accent);margin:14px 0 2px">🛒 Wares <span class="muted" style="font-size:11px;text-transform:none">unlock with loyalty level</span></h3>
    ${wareSec('weapons','⚔ Weapons',w=>`${w.cal} · ergo ${w.ergo}`)}
    ${wareSec('ammo','🔸 Ammo (×30)',w=>`${w.dmg}d ${w.pen}pen`)}
    ${wareSec('armors','🦺 Body Armor',w=>`class ${w.cls}`)}
    ${wareSec('helmets','🪖 Helmets',w=>`class ${w.cls}`)}
    ${wareSec('backpacks','🎒 Backpacks',w=>`${w.pts} pts`)}
    ${wareSec('rigs','🎽 Tactical Rigs',w=>`${w.pts} pts`)}
    ${wareSec('meds','💊 Meds',w=>`${w.heal?`+${w.heal} HP`:''}${w.cure?(w.heal?' · ':'')+(w.cure>2?'stops all bleed':'stops bleed'):''}`)}
    <button class="wide primary" style="margin-top:12px" onclick="closeOv()">Close</button>
  </div>`;
  $('overlay-root').innerHTML=''; $('overlay-root').appendChild(o);
}

function sellArsenal(type,i){
  const it=G.arsenal[type][i]; if(!it)return; const v=Math.round(it.value*incomeMult()); G.money+=v; G.arsenal[type].splice(i,1);
  toast('Sold '+it.name+' +'+fmt(v)+'₽','var(--gold)'); $('overlay-root').innerHTML=''; openArsenal();
}
function sellAll(){ const v=Math.round(G.stash.reduce((a,i)=>a+i.value,0)*incomeMult()); if(!v)return; G.money+=v; G.stash=[]; toast('Sold stash +'+fmt(v)+'₽','var(--gold)'); render(); }
function sellTrash(){ let v=0; G.stash=G.stash.filter(i=>{ if(i.tier==='junk'){v+=i.value;return false;} return true;}); v=Math.round(v*incomeMult()); G.money+=v; toast('Sold junk +'+fmt(v)+'₽','var(--gold)'); render(); }

/* ============================================================
   BASE / HIDEOUT UI
   ============================================================ */
function openBase(){
  const o=document.createElement('div'); o.className='overlay'; o.id='base-ov';
  const now=Date.now();
  // module cards
  const moduleCard=(m)=>{
    const lvl=moduleLevel(m.id), t=m.tiers[lvl], building=G.base.builds.find(b=>b.id===m.id);
    let action;
    if(building){ const left=Math.max(0,(building.finishAt-now)/1000), pct=clamp(100-left/building.dur*100,0,100);
      action=`<div class="muted" style="font-size:11px">Building L${building.toLevel} · <span id="bld-lbl-${m.id}">${Math.ceil(left)}</span>s</div><div class="bar" style="margin-top:3px"><span id="bld-bar-${m.id}" style="width:${pct}%;background:var(--warn)"></span></div>`;
    } else if(!t){ action='<span class="tag" style="color:var(--good);border-color:var(--good)">MAX</span>';
    } else {
      const ok=reqMet(t)&&G.money>=t.money&&hasMats(t.mats);
      action=`<div class="muted" style="font-size:10px;margin:3px 0">→ L${lvl+1}: ${fmt(t.money)}₽ · ${matsText(t.mats)} · ${t.time}s${t.req?` · <span style="${reqMet(t)?'':'color:var(--danger)'}">needs ${Object.entries(t.req).map(([k,v])=>MODULE_BY_ID[k].name+' L'+v).join(', ')}</span>`:''}</div>
        <button class="primary sm" onclick="startBuild('${m.id}')" ${ok?'':'disabled'}>${lvl===0?'Build':'Upgrade'}</button>`;
    }
    let craftBlock='';
    // Bitcoin Farm — passive accrual + claim
    if(m.id==='bitcoin' && lvl>0){
      const acc=G.base.btc||0, cap=btcCap(lvl), ready=Math.floor(acc);
      craftBlock=`<div style="margin-top:6px;border-top:1px solid var(--line);padding-top:5px">
        <div class="spread"><span class="muted" style="font-size:11px">₿ <span id="btc-lbl">${acc.toFixed(2)}</span>/${cap} BTC · ${(btcRate(lvl)*3600).toFixed(0)}/hr</span>
          <button class="sm" onclick="claimBitcoin()" ${ready>=1?'':'disabled'}>Claim ${ready} (${fmt(ready*BTC_VALUE)}₽)</button></div>
        <div class="bar" style="margin-top:3px"><span id="btc-bar" style="width:${clamp(acc/cap*100,0,100)}%;background:var(--gold)"></span></div></div>`;
    }
    // crafting stations — active job + queue + recipe list
    const recs=recipesFor(m.id);
    if(lvl>0 && recs.length){
      const active=activeCraft(m.id), queued=G.base.crafts.filter(c=>c.mod===m.id && !c.finishAt), total=moduleJobs(m.id).length;
      let rows='';
      if(active){ const r=RECIPES.find(x=>x.id===active.rid), left=Math.max(0,(active.finishAt-now)/1000), pct=clamp(100-left/active.dur*100,0,100);
        rows+=`<div class="spread"><span class="muted" style="font-size:11px">⚙ ${r.name} · <span id="crf-lbl-${m.id}">${Math.ceil(left)}</span>s</span><button class="sm danger" onclick="cancelCraft(${active.uid})">✕</button></div><div class="bar" style="margin:3px 0"><span id="crf-bar-${m.id}" style="width:${pct}%;background:var(--accent)"></span></div>`; }
      rows+=queued.map(q=>{ const r=RECIPES.find(x=>x.id===q.rid);
        return `<div class="item"><span class="muted" style="font-size:11px">⏳ ${r.name} (queued)</span><button class="sm danger" onclick="cancelCraft(${q.uid})">✕</button></div>`; }).join('');
      if(total<MAX_QUEUE){
        rows+=recs.map(r=>{ const ok=G.money>=r.money&&hasMats(r.mats);
          return `<div class="item"><span style="font-size:12px">${r.name} <span class="muted">${fmt(r.money)}₽ · ${matsText(r.mats)} · ${r.time}s</span></span>
            <button class="sm" onclick="startCraft('${r.id}')" ${ok?'':'disabled'}>${active?'Queue':'Craft'}</button></div>`; }).join('');
      } else rows+='<div class="muted" style="font-size:11px">Queue full ('+MAX_QUEUE+')</div>';
      craftBlock+=`<div style="margin-top:6px;border-top:1px solid var(--line);padding-top:5px">${rows}</div>`;
    }
    return `<div class="loc" style="cursor:default">
      <div class="spread"><div><b>${m.icon} ${m.name}</b> <span class="muted">L${lvl}/${m.tiers.length}</span>
        <div class="muted" style="font-size:11px">${m.desc}</div></div>
        <div style="text-align:right;min-width:130px">${action}</div></div>
      ${craftBlock}</div>`;
  };
  // materials market
  const matRow=MATERIALS.map(m=>`<div class="item"><span>🔧 ${m} <span class="muted">×${matCount(m)}</span></span>
    <button class="sm" onclick="buyMaterial('${m}')" ${G.money>=MATERIAL_PRICE[m]?'':'disabled'}>Buy ${fmt(MATERIAL_PRICE[m])}₽</button></div>`).join('');
  // raiders
  const raiderBlock = G.raiders.length? G.raiders.map(renderRaiderCard).join('') : '<div class="muted">No raiders yet.</div>';
  const canHire = G.raiders.length<maxRaiders();
  const idleCount = G.raiders.filter(r=>r.status==='idle').length;
  const squadControl = idleCount>1? `<div class="loc" style="cursor:default">
    <div class="spread"><b>🪖 Squad Deploy</b><span class="muted" style="font-size:11px">${idleCount} idle · safer in numbers</span></div>
    <div class="row" style="margin-top:6px">
      <select id="squad-loc">${LOCATIONS.filter(l=>!l.gated).map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select>
      <select id="squad-focus">${Object.entries(RAID_FOCUS).map(([k,f])=>`<option value="${k}">${f.icon} ${f.name}</option>`).join('')}</select>
      <button class="primary sm" onclick="deploySquad(document.getElementById('squad-loc').value, document.getElementById('squad-focus').value)">Send all ${idleCount} together</button>
    </div>
    <div class="muted" style="font-size:11px;margin-top:4px">Auto-kits each unarmed raider with the best spare gear in your arsenal.</div>
  </div>` : '';

  o.innerHTML=`<div class="panel" style="width:680px;max-width:95vw;max-height:90vh;overflow:auto">
    <div class="spread"><h2 style="border:none;margin:0">🏗 Hideout</h2><span class="muted">${fmt(G.money)} ₽</span></div>
    <h3 style="color:var(--accent);margin:10px 0 6px">Modules</h3>
    ${MODULES.map(moduleCard).join('')}
    <h3 style="color:var(--accent);margin:14px 0 6px">🛏 Raiders <span class="muted" style="font-size:11px;text-transform:none">${G.raiders.length}/${maxRaiders()} beds</span></h3>
    ${squadControl}
    ${raiderBlock}
    <button class="wide" style="margin-top:6px" onclick="hireRaider()" ${canHire?'':'disabled'}>${canHire?`Hire raider — ${fmt(hireCost())} ₽`:'Barracks full — upgrade for more beds'}</button>
    <h3 style="color:var(--accent);margin:14px 0 6px">🔧 Materials Market</h3>
    ${matRow}
    <button class="wide primary" style="margin-top:12px" onclick="closeOv()">Close</button>
  </div>`;
  $('overlay-root').innerHTML=''; $('overlay-root').appendChild(o);
}

// live-update countdown labels/bars in the open base overlay without rebuilding it
function updateBaseTimers(now){
  const set=(lid,bid,finishAt,dur)=>{ const l=$(lid),b=$(bid); const left=Math.max(0,(finishAt-now)/1000);
    if(l)l.textContent=Math.ceil(left); if(b)b.style.width=clamp(100-left/dur*100,0,100)+'%'; };
  G.base.builds.forEach(b=>set('bld-lbl-'+b.id,'bld-bar-'+b.id,b.finishAt,b.dur));
  G.base.crafts.forEach(c=>{ if(c.finishAt) set('crf-lbl-'+c.mod,'crf-bar-'+c.mod,c.finishAt,c.dur); });
  G.raiders.forEach(r=>{ if(r.status==='raiding') set('rdr-lbl-'+r.id,'rdr-bar-'+r.id,r.returnAt,r.raidDur||60); });
  const bl=moduleLevel('bitcoin');
  if(bl>0){ const acc=G.base.btc||0, cap=btcCap(bl); const l=$('btc-lbl'), b=$('btc-bar');
    if(l)l.textContent=acc.toFixed(2); if(b)b.style.width=clamp(acc/cap*100,0,100)+'%'; }
}

/* ============================================================
   RAIDERS (passive crew)
   ============================================================ */
function baseOrRender(){ if(document.getElementById('base-ov')) openBase(); else render(); }
function hireRaider(){
  if(maxRaiders()<=0) return toast('Build a Barracks first','var(--danger)');
  if(G.raiders.length>=maxRaiders()) return toast('Barracks full — upgrade it for more beds','var(--danger)');
  const cost=hireCost(); if(G.money<cost) return toast('Not enough roubles','var(--danger)');
  G.money-=cost;
  G.raiders.push({id:++raiderId,name:pick(RAIDER_NAMES)+' '+ri(10,99),skill:1.0,status:'idle',weapon:null,armor:null,returnAt:0,locId:'customs',raidsDone:0});
  toast('Raider hired','var(--accent)'); baseOrRender();
}
function fireRaider(id){ const r=G.raiders.find(r=>r.id===id); if(!r||r.status==='raiding')return;
  if(r.weapon)G.arsenal.weapons.push(r.weapon); if(r.armor)G.arsenal.armors.push(r.armor);
  G.raiders=G.raiders.filter(x=>x.id!==id); baseOrRender();
}
function renderRaiderCard(r){
  let body;
  if(r.status==='raiding'){
    const left=Math.max(0,(r.returnAt-Date.now())/1000), total=r.raidDur||60, pct=clamp(100-(left/total*100),0,100);
    body=`<div class="muted" style="font-size:12px">${r.focus?RAID_FOCUS[r.focus].icon+' ':''}Raiding ${LOCATIONS.find(l=>l.id===r.locId)?.name||''}${r.squad>1?` <span style="color:var(--accent)">· squad of ${r.squad}</span>`:''} · <span id="rdr-lbl-${r.id}">${Math.ceil(left)}</span>s</div>
      <div class="bar" style="margin-top:4px"><span id="rdr-bar-${r.id}" style="width:${pct}%;background:var(--warn)"></span></div>`;
  } else {
    body=`<div class="row" style="margin-top:6px">
      <select id="rw-${r.id}"><option value="">— no weapon —</option>${G.arsenal.weapons.map((w,i)=>`<option value="${i}">${w.data.name}</option>`).join('')}</select>
      <select id="ra-${r.id}"><option value="">— no armor —</option>${G.arsenal.armors.map((a,i)=>`<option value="${i}">${a.data.name} (c${a.data.cls})</option>`).join('')}</select>
      <select id="rl-${r.id}">${LOCATIONS.filter(l=>!l.gated).map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select>
      <select id="rf-${r.id}" title="focus">${Object.entries(RAID_FOCUS).map(([k,f])=>`<option value="${k}" ${r.focus===k?'selected':''}>${f.icon} ${f.name}</option>`).join('')}</select>
      <button class="primary sm" onclick="sendRaider(${r.id})">Send</button>
      <button class="danger sm" onclick="fireRaider(${r.id})">✕</button></div>`;
  }
  return `<div class="raider"><div class="spread"><span class="nm">${r.name}</span>
    <span class="muted">skill ${r.skill.toFixed(1)} · ${r.raidsDone} raids</span></div>${body}</div>`;
}
function sendRaider(id){
  const r=G.raiders.find(r=>r.id===id); if(!r)return;
  const wi=$('rw-'+id).value, ai=$('ra-'+id).value, loc=$('rl-'+id).value, fc=$('rf-'+id)?$('rf-'+id).value:'loot';
  if(wi!=='') r.weapon=G.arsenal.weapons.splice(+wi,1)[0];
  if(ai!=='') r.armor=G.arsenal.armors.splice(+ai,1)[0];
  const L=LOCATIONS.find(l=>l.id===loc);
  const timeMult=(1-intelLevel()*0.12)*raiderSpeedMult();   // Intel Center + prestige Crew Efficiency
  r.status='raiding'; r.locId=loc; r.focus=fc; r.raidDur=L.raidLen*0.5*timeMult; r.returnAt=Date.now()+r.raidDur*1000; r.squad=1;
  toast(`${r.name} → ${L.name} (${RAID_FOCUS[fc].name})`,'var(--warn)'); baseOrRender();
}
// pull the highest-value item out of an arsenal array
function bestFromArsenal(arr){ if(!arr.length) return null; let bi=0; for(let i=1;i<arr.length;i++) if(arr[i].value>arr[bi].value) bi=i; return arr.splice(bi,1)[0]; }
// send every idle raider on the same raid together (auto-kitting from the arsenal)
function deploySquad(locId, focus){
  focus=focus||'loot';
  const idle=G.raiders.filter(r=>r.status==='idle');
  if(idle.length<2) return toast('Need at least 2 idle raiders','var(--danger)');
  const L=LOCATIONS.find(l=>l.id===locId);
  const dur=L.raidLen*0.5*(1-intelLevel()*0.12)*raiderSpeedMult(), returnAt=Date.now()+dur*1000;
  for(const r of idle){
    if(!r.weapon){ const w=bestFromArsenal(G.arsenal.weapons); if(w) r.weapon=w; }
    if(!r.armor){ const a=bestFromArsenal(G.arsenal.armors); if(a) r.armor=a; }
    r.status='raiding'; r.locId=locId; r.focus=focus; r.raidDur=dur; r.returnAt=returnAt; r.squad=idle.length;
  }
  toast(`Squad of ${idle.length} → ${L.name} (${RAID_FOCUS[focus].name})`,'var(--warn)'); baseOrRender();
}
// produce one loot item for a raider, biased by their focus
function raiderLootItem(L, r, focus){
  const depthBonus = r.skill*0.15 + intelLevel()*0.2;
  if(focus==='resources' && Math.random()<0.7){
    const name=pick(MATERIALS), cnt=ri(1,3);
    return {kind:'material', name, count:cnt, value:Math.round((MATERIAL_PRICE[name]||3000)*0.5)*cnt, tier:'common'};
  }
  if(focus==='gear' && Math.random()<0.6){
    const lvl=clamp(0.3 + r.skill*0.06, 0, 1), roll=Math.random();
    if(roll<0.5){ const w=gearByLevel(WEAPONS,lvl); return {kind:'weapon',name:w.name,value:w.val,tier:'rare',data:{...w}}; }
    if(roll<0.8){ const a=gearByLevel(ARMORS,lvl);  return {kind:'armor', name:a.name,value:a.val,tier:'rare',data:{...a}}; }
    const h=gearByLevel(HELMETS.slice(1),lvl);       return {kind:'helmet',name:h.name,value:h.val,tier:'rare',data:{...h}};
  }
  // pvp hunts richer targets → push the loot tier up
  return rollLoot(L.lootBias, depthBonus + (focus==='pvp'?0.6:0));
}
function resolveRaider(r){
  const L=LOCATIONS.find(l=>l.id===r.locId);
  const focus=r.focus||'loot';
  const wPow=r.weapon? r.weapon.data.dmgMod*30 : 8;
  const aPro=r.armor? r.armor.data.cls*9 : 0;
  const squadBonus = r.squad>1? Math.min(0.18,(r.squad-1)*0.04) : 0;   // safer in numbers
  const focusSurv = focus==='pvp'? -0.12 : focus==='resources'? 0.05 : 0;
  let surv=clamp(0.5 + r.skill*0.06 + wPow*0.004 + aPro*0.006 - L.risk*0.12 + intelLevel()*0.02 + squadBonus + focusSurv, 0.15, 0.97);
  const lootCount=ri(2,4)+Math.floor(r.skill/2)+(focus==='pvp'?2:0);
  r.raidsDone++;
  if(Math.random()<surv){
    let total=0, items=[]; for(let k=0;k<lootCount;k++){ const it=raiderLootItem(L,r,focus); routeLoot(it); total+=it.value; items.push(it); }
    // crafting materials for the base (extra when focused on resources)
    const mats=ri(1,2)+intelLevel()+(focus==='resources'?ri(2,4):0); for(let k=0;k<mats;k++){ const mn=pick(MATERIALS); G.materials[mn]=matCount(mn)+1; }
    r.skill=Math.min(10,r.skill+0.35); r.status='idle';
    toast(`${r.name} extracted +${fmt(total)}₽`,'var(--good)');
    addMail(r.name, `Extracted from ${L.name}`,
      `Run focus: <b>${RAID_FOCUS[focus].icon} ${RAID_FOCUS[focus].name}</b>${r.squad>1?` · squad of ${r.squad}`:''}.<br>
       Haul value: <b style="color:var(--gold)">${fmt(total)}₽</b><br>${summarizeHaul(items, mats)}`, '🎒');
  } else {
    r.weapon=null; r.armor=null; r.skill=Math.max(1,r.skill-0.5); r.status='idle'; G.stats.deaths++;
    toast(`${r.name} died — gear lost`,'var(--danger)');
    addMail(r.name, `KIA on ${L.name}`, `<span style="color:var(--danger)">${r.name} was killed in action.</span> Their assigned gear was lost. They have respawned at the Barracks with reduced skill.`, '💀');
  }
}

/* ---------- SCAV RUNS — free raid, random low kit, loot ramps as you survive ---------- */
const SCAV_LOC = {id:'scav', name:'SCAV RUN', risk:1.1, combat:0.32, raidLen:70,
  enemies:['scav','scav','pmc','sniper'], lootBias:{junk:55,common:33,rare:10,epic:2,legendary:0}};
function scavCD(){ return Math.max(40, 180 - intelLevel()*20); }
function scavCDLeft(){ return Math.max(0, scavCD() - (Date.now()-(G.lastScav||0))/1000); }
function startScavRun(){
  if(G.raid) return;
  if(scavCDLeft()>0) return toast(`Scav recovering — ${Math.ceil(scavCDLeft())}s`,'var(--danger)');
  const w=pick(WEAPONS.filter(x=>x.val<=62000));                       // random cheap gun
  const am=(AMMO_BY_CAL[w.cal]||[]).slice().sort((a,b)=>a.val-b.val)[0]; // cheapest matching ammo
  G._scav={ gear:G.gear, ammoName:am?am.name:null, ammoHad:am?(G.ammoStock[am.name]||0):0 };
  G.gear={ weapons:[{...w},null], ammos:[am?am.name:'',''], active:0,
    armor:{...pick(ARMORS.slice(0,3))}, helmet:{...pick(HELMETS.slice(0,4))}, backpack:{...BACKPACKS[0]}, rig:{...RIGS[0]} };
  if(am) G.ammoStock[am.name]=(G.ammoStock[am.name]||0)+240;
  G.lastScav=Date.now(); sfx('click');
  startRaid('scav');
  pushLog(`Spawned as a <b>Scav</b> with a ${w.name}. Free kit — push deeper for better loot, but don't get greedy.`);
  render();
}
function endRaidCleanup(){   // restore real loadout after a scav run
  if(G._scav){ if(G._scav.ammoName) G.ammoStock[G._scav.ammoName]=G._scav.ammoHad; G.gear=G._scav.gear; G._scav=null; }
}
function startRaid(locId){
  const L = locId==='scav'? SCAV_LOC : LOCATIONS.find(l=>l.id===locId);
  if(L.gated){ if(G.keys<1) return toast('No keycard','var(--danger)'); G.keys--; }
  G.raid={loc:L,depth:0,hp:100,maxHp:100,bleed:0,combo:0,carried:[],carriedVal:0,log:[],combat:null,scavCooldown:0,alive:true,mag:[0,0],magAmmo:['',''],isScav:locId==='scav',autoScavT:0};
  loadAllMags();
  pushLog(`Inserted into <b style="color:var(--accent)">${L.name}</b>. Carry capacity: ${carryCapacity()} pts. Scavenge, fight, extract.`);
  render();
}
function comboMult(r){ return 1 + Math.min(1.2, (Math.max(0,(r.combo||0)-1))*0.05); }   // greed: builds as you keep scavenging
function pushLog(m){ if(G.raid){ G.raid.log.push(m); if(G.raid.log.length>60)G.raid.log.shift(); } }
// returns false if there's no room (in points) to carry the item
function addCarried(it){
  const r=G.raid; if(!r) return false;
  if(carriedPoints()+itemPoints(it) > carryCapacity()) return false;
  r.carried.push(it); r.carriedVal+=it.value; return true;
}

function renderRaid(){

    ${r.isScav?'<div class="muted" style="font-size:11px;margin-bottom:6px;color:var(--warn)">SCAV RUN — free random kit. Your own gear is safe. Loot improves the longer you survive.</div>':''}
    <div class="spread" style="margin-bottom:6px"><span class="muted">HEALTH${r.bleed>0?` <span class="blink" style="color:var(--danger)">🩸 BLEEDING ×${r.bleed}</span>`:''}</span>
      <span id="raidHpTxt" style="color:${r.hp<35?'var(--danger)':'var(--good)'}">${Math.round(r.hp)}/${r.maxHp}</span></div>
    <div class="bar"><span id="raidHpBar" style="width:${clamp(r.hp,0,100)}%;background:${r.hp<35?'var(--danger)':'var(--good)'}"></span></div>
    ${meds.length?`<div class="row" style="margin-top:8px">${meds.map(m=>`<button class="sm" onclick="useMed('${m.name}')">🩹 ${m.name} ×${medCount(m.name)}</button>`).join('')}</div>`

      <span style="color:${full?'var(--danger)':'var(--dim)'}">${slots}/${cap} pts${full?' — FULL':''}</span></div>

    <div class="feed">${r.carried.length? r.carried.slice().reverse().map(itemRow).join('') : '<div class="muted">nothing yet</div>'}</div></div>

    <div class="feed">${r.log.slice().reverse().map(m=>`<div>${m}</div>`).join('')}</div></div>`;
}
function currentDeathChance(){
  const r=G.raid;
  const hpPenalty = 1 + (1 - clamp(r.hp,0,100)/100)*1.5;   // wounded = much riskier
  const bleedPenalty = 1 + (r.bleed||0)*0.30;
  return clamp((0.05 + (r.depth/100)*0.32) * r.loc.risk * loadoutMitigation() * hpPenalty * bleedPenalty, 0.01, 0.94);
}
function scavenge(){
  const r=G.raid; if(!r||!r.alive||r.combat||r.scavCooldown>0)return;
  r.depth=clamp(r.depth+rnd(6,12),0,100);
  G.progress.bestDepth=Math.max(G.progress.bestDepth,r.depth);
  if(r.depth>=100){
    const it=rollLoot(r.loc.lootBias,3); addCarried(it);
    pushLog(`Reached the <b style="color:var(--good)">exit</b>. Grabbed <span style="color:${TIERS[it.tier].color}">${it.name}</span> on the way out.`);
    toast('Max depth — auto-extracted!','var(--good)'); extract(); return;
  }
  if(Math.random()<r.loc.combat*(0.6+r.depth/120)){ startCombat(); return; }
  if(Math.random()<currentDeathChance()){ playerDie(r.isScav?'Your scav got domed.':'A guard caught you mid-scav.'); return; }
  r.combo=(r.combo||0)+1;
  const it=rollLoot(r.loc.lootBias, r.isScav? r.depth/14 : r.depth/40);   // scav loot ramps faster the longer you live
  it.value=Math.round(it.value*comboMult(r));
  if(addCarried(it)){
    sfx('click'); juiceLoot(it);
    if(it.kind==='key') pushLog(`<b style="color:var(--gold)">★ FOUND A LABS ACCESS KEYCARD ★</b>`);
    else pushLog(`Found <span style="color:${TIERS[it.tier].color}">${(it.kind==='ammo'||it.kind==='med')&&it.count>1?it.name+' ×'+it.count:it.name}</span> (+${fmt(it.value)}₽)${r.combo>2?` <span class="muted">×${comboMult(r).toFixed(2)} combo</span>`:''}`);
  } else {
    pushLog(`Found <span style="color:${TIERS[it.tier].color}">${it.name}</span> but your <b style="color:var(--danger)">backpack is full</b> — left it behind.`);
  }
  r.scavCooldown=0.35; render();
}
function extract(){
  const r=G.raid; if(!r||!r.alive)return;
  const loc=r.loc.id;
  const haul=r.carried.slice(), val=r.carriedVal;
  haul.forEach(routeLoot);                 // bank everything carried
  G.stats.extracts++;
  G.progress.extracts++; G.progress.extractsAt[loc]=(G.progress.extractsAt[loc]||0)+1;
  // tear down any combat overlay just in case
  const cov=$('combat-ov'); if(cov) cov.remove();
  const wasScav=G.raid.isScav;
  G.raid=null; endRaidCleanup(); save();
  sfx('extract'); bigBanner(wasScav?'SCAV EXTRACT':'EXTRACTED','var(--good)');
  showExtractSummary(haul,val,loc);
}
function showExtractSummary(haul,val,loc){

function playerDie(reason){
