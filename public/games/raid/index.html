/* ============================================================
   COMBAT (aiming + penetration)
   ============================================================ */
function startCombat(){
  const r=G.raid;
  const c={ squadSize:ri(1,5), killedCount:0, targets:[], lootGrab:null, over:false };
  r.combat=c;
  spawnEnemy(c);
  pushLog(`<b style="color:var(--danger)">Contact!</b> ${c.squadSize} hostile${c.squadSize>1?'s':''} in the area.`);
  renderCombat();
}
function spawnEnemy(c){
  const base=ENEMY[pick(G.raid.loc.enemies)];
  c.name=base.name; c.armorCls=base.armorCls; c.helmetCls=base.helmetCls; c.dmg=base.dmg;
  c.bleed=base.bleed||0; c.gun=pick(base.guns);   // gun is a guaranteed drop on kill
  c.hp=Math.round(base.hp*rnd(0.85,1.15)); c.maxHp=c.hp;
  c.aggro=100; c.aggroSpeed=base.aim*rnd(0.85,1.15); c.over=false;
  spawnTargets();
}
function spawnTargets(){
  const c=G.raid.combat; if(!c)return;
  const ergo=(activeEff()?.ergo)||40;
  const handling=1-clamp(ergo/170,0,0.6);  // low ergo → faster targets
  const layout=[
    {type:'head',label:'HEAD',size:22,mult:2.6,x:50,y:16,sp:22},
    {type:'body',label:'CHEST',size:62,mult:1.0,x:50,y:46,sp:5},
    {type:'limb',label:'ARM',size:38,mult:0.4,x:24,y:46,sp:11},
    {type:'limb',label:'ARM',size:38,mult:0.4,x:76,y:46,sp:11},
    {type:'limb',label:'LEG',size:40,mult:0.7,x:40,y:78,sp:9},
    {type:'limb',label:'LEG',size:40,mult:0.7,x:60,y:78,sp:9},
  ];
  c.targets=layout.map((t,i)=>{
    const speed=t.sp*handling*rnd(0.7,1.3);
    const ang=rnd(0,Math.PI*2);
    return {...t,id:i,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed*0.6};
  });
}
function partArmor(c,type){ return type==='head'? c.helmetCls : type==='body'? c.armorCls : 0; }
function renderCombat(){
  const c=G.raid?.combat; if(!c)return;
  let ov=$('combat-ov');
  if(!ov){ ov=document.createElement('div'); ov.className='overlay'; ov.id='combat-ov'; $('overlay-root').appendChild(ov); }
  const am=currentAmmo();
  const meds=ownedMeds();
  ov.innerHTML=`
    <div style="width:580px;max-width:94vw;margin-bottom:6px" class="spread">
      <div><b style="color:var(--danger)">${c.name}</b> <span class="muted">armor c${c.armorCls} · helmet c${c.helmetCls}${c.squadSize>1?` · enemy ${c.killedCount+1}/${c.squadSize}`:''}</span></div>
      <div class="muted">your HP <b id="yourHp" style="color:${G.raid.hp<35?'var(--danger)':'var(--good)'}">${Math.round(G.raid.hp)}</b>${G.raid.bleed>0?` <span class="blink" style="color:var(--danger)">🩸×${G.raid.bleed}</span>`:''}</div>
    </div>
    <div style="width:580px;max-width:94vw;margin-bottom:6px" class="spread">
      <div class="row">
        <button class="sm ${G.raid.mag[G.gear.active]<=0?'blink':''}" style="${G.raid.mag[G.gear.active]<=0?'border-color:var(--danger);color:var(--danger)':''}" onclick="reloadActive()">🔄 RELOAD</button>
        ${hasSecondary()?`<button class="sm" onclick="switchWeapon()">⇄ ${G.gear.weapons[G.gear.active===0?1:0].name}</button>`:''}
      </div>
      <div class="row">
        ${meds.length? meds.slice(0,3).map(m=>`<button class="sm" onclick="useMed('${m.name}')">🩹 ${m.name.split(' ')[0]} ×${medCount(m.name)}</button>`).join('') : '<span class="muted" style="font-size:11px">no meds</span>'}
      </div>
    </div>
    <div class="bar" style="width:580px;max-width:94vw"><span id="enemyHpBar" style="width:${clamp(c.hp/c.maxHp*100,0,100)}%;background:var(--danger)"></span></div>
    <div class="arena" id="arena" onclick="missShot(event)">
      <div class="crosshair-info">
        <span id="ammoTxt" style="color:${G.raid.mag[G.gear.active]>0?'var(--text)':'var(--danger)'}">${ammoHudText()}</span>
        <span id="aimTxt" style="color:var(--warn)">ENEMY AIM ${Math.round(c.aggro)}%</span>
      </div>
      <div class="bar" style="position:absolute;bottom:0;left:0;right:0;height:8px;border:none"><span id="aimBar" style="width:${c.aggro}%;background:var(--warn)"></span></div>
      <div class="flash" id="flash"></div>
      ${c.targets.map(t=>{
        const pa=partArmor(c,t.type);
        const armTag=pa>0?`<br><span style="opacity:.8">🛡c${pa}</span>`:'';
        return `<div class="target ${t.type}" id="tgt${t.id}" style="left:${t.x}%;top:${t.y}%;width:${t.size}px;height:${t.size}px"
          onclick="hitTarget(event,${t.id})">${t.label}${armTag}</div>`;}).join('')}
      ${c.lootGrab? renderLootGrab(c.lootGrab):''}
    </div>
    <div class="muted" style="margin-top:8px;width:580px;max-width:94vw;text-align:center">
      Armored parts (🛡) need ammo <b>pen ≥ class×9</b> or you barely scratch them. Aim unarmored limbs or the head — but the head is small and fast.
    </div>`;
}
function renderLootGrab(lg){
  return lg.items.map((it,i)=>{
    if(it.taken) return '';
    if(it.kind==='weapon'){
      return `<div class="loot-drop" style="left:${it.x}%;top:${it.y}%">
        <div onclick="grabLoot(event,${i})" style="cursor:pointer">⚔ ${it.name} +${fmt(it.value)}₽</div>
        <div class="row" style="gap:3px;margin-top:3px;justify-content:center">
          <button class="sm" onclick="equipLootedGun(event,${i},0)">↦ primary</button>
          <button class="sm" onclick="equipLootedGun(event,${i},1)">↦ second</button>
        </div></div>`;
    }
    const lbl=(it.kind==='ammo'||it.kind==='med')&&it.count>1?it.name+' ×'+it.count:it.name;
    return `<div class="loot-drop" style="left:${it.x}%;top:${it.y}%" onclick="grabLoot(event,${i})">${lbl} +${fmt(it.value)}₽</div>`;
  }).join('')
    +`<div class="crosshair-info" style="top:auto;bottom:14px;justify-content:center"><span class="blink" id="grabTxt" style="color:var(--gold)">GRAB LOOT (or ↦ equip a gun) — ${lg.left.toFixed(1)}s</span></div>`;
}
// take a downed enemy's gun straight into a weapon slot, displacing the old one
function equipLootedGun(e,i,slot){
  e.stopPropagation();
  const lg=G.raid?.combat?.lootGrab; if(!lg)return;
  const it=lg.items[i]; if(!it||it.taken||it.kind!=='weapon')return;
  const old=G.gear.weapons[slot];
  if(old){
    const oldItem={kind:'weapon',name:old.name,value:old.val,tier:'common',data:old};
    if(!addCarried(oldItem)) G.arsenal.weapons.push(oldItem);  // bag full → goes to stash arsenal
  }
  G.gear.weapons[slot]={...it.data};
  pickCompatibleAmmo(slot); reloadSlot(slot); G.gear.active=slot;
  it.taken=true;
  pushLog(`Took <b>${it.name}</b> off the body — now your ${slot===0?'primary':'secondary'}.`);
  toast('Equipped '+it.name,'var(--accent)');
  if(lg.items.every(x=>x.taken)) nextEnemyOrEnd(); else renderCombat();
}
function ammoHudText(){
  const s=G.gear.active, w=activeWeapon(); if(!w) return 'NO WEAPON';
  const a=AMMO_BY_NAME[G.raid.magAmmo[s]];
  const reserve=a?ammoCount(a.name):0;
  return `${w.name} L${gunLevel(w.name)} · MAG ${G.raid.mag[s]}/${magCap(s)}${a?` · ${a.pen}pen · reserve ${reserve}`:''}`;
}
function updateCombatHUD(){
  const c=G.raid?.combat; if(!c)return;
  const bar=$('enemyHpBar'); if(bar) bar.style.width=clamp(c.hp/c.maxHp*100,0,100)+'%';
  const at=$('ammoTxt');
  if(at){ at.style.color=G.raid.mag[G.gear.active]>0?'var(--text)':'var(--danger)'; at.textContent=ammoHudText(); }
  const hp=$('yourHp'); if(hp){ hp.textContent=Math.round(G.raid.hp); hp.style.color=G.raid.hp<35?'var(--danger)':'var(--good)'; }
}
// fire one round from the active magazine; returns the chambered ammo or null if empty
function consumeRound(){
  const s=G.gear.active; if(!G.raid) return null;
  if(G.raid.mag[s]>0){ G.raid.mag[s]--; return magAmmo(); }
  return null;   // empty mag — must reload
}
function hitTarget(e,id){
  e.stopPropagation();
  const c=G.raid?.combat; if(!c||c.over||c.lootGrab)return;
  const t=c.targets.find(t=>t.id===id); if(!t)return;
  const am=consumeRound();   // every shot costs a bullet from the mag
  if(!am){   // empty magazine — the gun won't fire. You MUST reload.
    spawnHitText(t.x,t.y,'*click*','var(--danger)'); sfx('err');
    const at=$('ammoTxt'); if(at){ at.textContent='EMPTY — RELOAD'; at.style.color='var(--danger)'; }
    return;
  }
  const penF=penFactor(am.pen, partArmor(c,t.type));
  const crit = Math.random()<0.12;   // juice: critical hits
  let dmg=am.dmg*activeEff().dmgMod*t.mult*penF*rnd(0.9,1.1)*dmgMult();
  if(crit) dmg*=3;
  c.hp-=dmg;
  // floating feedback
  const blocked = penF<0.35 && partArmor(c,t.type)>0;
  if(crit && !blocked){ spawnHitText(t.x,t.y,'CRIT '+Math.round(dmg),'var(--gold)',true); sfx('crit'); shake('.arena',7); }
  else { spawnHitText(t.x,t.y, blocked?'ARMOR':Math.round(dmg), blocked?'var(--dim)':(t.type==='head'?'var(--gold)':'#fff')); sfx('hit'); }
  // recoil: nudge + re-randomize velocity a touch
  c.targets.forEach(tt=>{ const ang=rnd(0,Math.PI*2); const m=Math.hypot(tt.vx,tt.vy); tt.vx=Math.cos(ang)*m; tt.vy=Math.sin(ang)*m*0.6; });
  if(c.hp<=0){ enemyKilled(); return; }
  if(am && G.raid.mag[G.gear.active]===0) renderCombat();  // just went empty → show RELOAD
  else updateCombatHUD();
}
function spawnHitText(x,y,txt,color,big){
  const a=$('arena'); if(!a)return;
  const d=document.createElement('div');
  d.textContent=txt; d.style.cssText=`position:absolute;left:${x}%;top:${y}%;transform:translate(-50%,-50%);color:${color};font-weight:bold;font-size:${big?22:13}px;pointer-events:none;text-shadow:0 0 ${big?8:3}px #000;z-index:5`;
  a.appendChild(d);
  if(big){ d.style.animation='critpop .6s forwards'; setTimeout(()=>d.remove(),620); }
  else { d.style.transition='.5s'; requestAnimationFrame(()=>{ d.style.top=(y-12)+'%'; d.style.opacity='0'; }); setTimeout(()=>d.remove(),520); }
}
function missShot(e){
  // clicking empty space still fires a round — misses burn ammo so you can run dry
  const c=G.raid?.combat; if(!c||c.over||c.lootGrab)return;
  if(consumeRound()){
    const a=$('arena');
    if(a){ const rect=a.getBoundingClientRect&&a.getBoundingClientRect();
      let x=50,y=50;
      if(rect&&rect.width){ x=clamp((e.clientX-rect.left)/rect.width*100,2,98); y=clamp((e.clientY-rect.top)/rect.height*100,2,98); }
      spawnHitText(x,y,'miss','var(--dim)');
    }
    updateCombatHUD();
  }
}
function enemyShoots(){
  const c=G.raid?.combat; if(!c)return;
  const roll=Math.random();
  const part = roll<0.14?'head' : roll<0.62?'body' : 'limb';
  const yourMit = part==='head'? clamp(G.gear.helmet.cls*0.12,0,0.70)
               : part==='body'? clamp(G.gear.armor.cls*0.11,0,0.66) : 0.10;
  const partW = part==='head'?1.7 : part==='body'?1.0 : 0.5;
  let dmg=clamp(c.dmg*partW*rnd(0.8,1.2)*(1-yourMit), 3, 90);
  G.raid.hp-=dmg;
  // chance to inflict a bleed — needs a bandage or it drains you
  let bled=false;
  if(Math.random() < (c.bleed||0)*(part==='head'?0.6:1)){ G.raid.bleed=(G.raid.bleed||0)+1; bled=true; }
  const f=$('flash'); if(f){ f.style.opacity='.6'; setTimeout(()=>{if(f)f.style.opacity='0';},120); }
  pushLog(`${c.name} hit your ${part} for ${Math.round(dmg)}.${bled?' <span style="color:var(--danger)">You are bleeding!</span>':''}`);
  if(G.raid.hp<=0){ closeCombat(); playerDie(`${c.name} put you down.`); return; }
  c.aggro=100; spawnTargets(); renderCombat();
}
function enemyKilled(){
  const c=G.raid.combat; c.over=true; c.killedCount++; G.stats.kills++;
  sfx('kill'); shake('.arena',9);
  const loc=G.raid.loc.id; G.progress.kills++; G.progress.killsAt[loc]=(G.progress.killsAt[loc]||0)+1;
  // weapon mastery XP for the gun in hand
  const wn=activeWeapon()?.name;
  if(wn){ const before=gunLevel(wn); G.gunLevels[wn]=(G.gunLevels[wn]||0)+1;
    if(gunLevel(wn)>before && gunLevel(wn)<=6) toast(`★ ${wn} reached Level ${gunLevel(wn)}`,'var(--gold)'); }
  const more=c.killedCount<c.squadSize;
  pushLog(`<b style="color:var(--good)">${c.name} down (${c.killedCount}/${c.squadSize}).</b> ${more?'Grab loot — more incoming!':'Squad cleared. Loot the bodies!'}`);
  const items=[];
  // guaranteed: the enemy's gun
  const gun=WPN_BY_NAME[c.gun]||WEAPONS[0];
  items.push({kind:'weapon',name:gun.name,value:gun.val,tier:'rare',data:{...gun},x:rnd(20,80),y:rnd(24,72),taken:false});
  const n=ri(1,3);
  for(let k=0;k<n;k++){ const it=rollLoot(G.raid.loc.lootBias, G.raid.depth/30+0.6); items.push({...it,x:rnd(18,82),y:rnd(24,74),taken:false}); }
  c.lootGrab={items,left:more?3.4:4.8}; renderCombat();
}
function grabLoot(e,i){
  e.stopPropagation();
  const lg=G.raid?.combat?.lootGrab; if(!lg)return;
  const it=lg.items[i]; if(!it||it.taken)return;
  if(!addCarried(it)){ toast('Backpack full','var(--danger)'); sfx('err'); pushLog(`<span class="muted">Backpack full — couldn't carry ${it.name}.</span>`); return; }
  it.taken=true; sfx('cash'); juiceLoot(it);
  if(it.kind==='key') pushLog(`<b style="color:var(--gold)">★ KEYCARD looted from body ★</b>`);
  else pushLog(`Grabbed <span style="color:${TIERS[it.tier].color}">${(it.kind==='ammo'||it.kind==='med')&&it.count>1?it.name+' ×'+it.count:it.name}</span> (+${fmt(it.value)}₽)`);
  if(lg.items.every(x=>x.taken)) nextEnemyOrEnd(); else renderCombat();
}
// auto-loot: grab the next dropped item (used by the Auto-Loot upgrade)
function autoGrabNext(){
  const lg=G.raid?.combat?.lootGrab; if(!lg)return;
  const i=lg.items.findIndex(x=>!x.taken); if(i<0)return;
  const it=lg.items[i];
  if(addCarried(it)){ sfx('cash'); juiceLoot(it); pushLog(`Auto-grabbed <span style="color:${TIERS[it.tier].color}">${it.name}</span> (+${fmt(it.value)}₽)`); }
  it.taken=true;   // mark taken either way so it doesn't loop on a full bag
  if(lg.items.every(x=>x.taken)) nextEnemyOrEnd(); else renderCombat();
}
// after a body is looted (or the grab window times out), bring the next squad member or end the fight
function nextEnemyOrEnd(){
  const c=G.raid&&G.raid.combat; if(!c)return;
  c.lootGrab=null;
  if(c.killedCount<c.squadSize){ spawnEnemy(c); pushLog(`<b style="color:var(--danger)">Next hostile engages!</b>`); renderCombat(); }
  else closeCombat();
}
function closeCombat(){ if(G.raid)G.raid.combat=null; const ov=$('combat-ov'); if(ov)ov.remove(); render(); }

/* ============================================================
   GAME LOOP
   ============================================================ */
function tick(){
  const now=Date.now(); const dt=Math.min(0.05,(now-lastTick)/1000); lastTick=now;

  if(G.raid && G.raid.scavCooldown>0){
    G.raid.scavCooldown=Math.max(0,G.raid.scavCooldown-dt);
    if(G.raid.scavCooldown===0 && !G.raid.combat){ const b=$('scavBtn'); if(b){b.disabled=false;b.classList.add('blink');b.textContent='⛏ SCAVENGE';} }
  }

  // bleeding drains HP over time until bandaged — can kill you
  if(G.raid && G.raid.alive && (G.raid.bleed||0)>0){
    G.raid.hp -= G.raid.bleed*1.7*dt;
    if(G.raid.hp<=0){
      if(G.raid.combat) closeCombat();
      playerDie('You bled out.');
    } else {
      const yh=$('yourHp'); if(yh){ yh.textContent=Math.round(G.raid.hp); yh.style.color=G.raid.hp<35?'var(--danger)':'var(--good)'; }
      const rb=$('raidHpBar'), rt=$('raidHpTxt');
      if(rb){ rb.style.width=clamp(G.raid.hp,0,100)+'%'; rb.style.background=G.raid.hp<35?'var(--danger)':'var(--good)'; }
      if(rt){ rt.textContent=Math.round(G.raid.hp)+'/'+G.raid.maxHp; rt.style.color=G.raid.hp<35?'var(--danger)':'var(--good)'; }
    }
  }

  const c=G.raid&&G.raid.combat;
  if(c && !c.over){
    // move targets (continuous aim challenge)
    for(const t of c.targets){
      t.x+=t.vx*dt; t.y+=t.vy*dt;
      if(t.x<8){t.x=8;t.vx=Math.abs(t.vx);} if(t.x>92){t.x=92;t.vx=-Math.abs(t.vx);}
      if(t.y<12){t.y=12;t.vy=Math.abs(t.vy);} if(t.y>86){t.y=86;t.vy=-Math.abs(t.vy);}
      const el=$('tgt'+t.id); if(el){ el.style.left=t.x+'%'; el.style.top=t.y+'%'; }
    }
    // enemy aim
    c.aggro-=c.aggroSpeed*dt;
    if(c.aggro<=0){ enemyShoots(); }
    else { const ab=$('aimBar'); if(ab)ab.style.width=clamp(c.aggro,0,100)+'%';
           const at=$('aimTxt'); if(at){ at.textContent='ENEMY AIM '+Math.round(c.aggro)+'%'; at.style.color=c.aggro<35?'var(--danger)':'var(--warn)'; }
           const ab2=$('aimBar'); if(ab2)ab2.style.background=c.aggro<35?'var(--danger)':'var(--warn)'; }
  }
  if(c && c.lootGrab){
    c.lootGrab.left-=dt; const g=$('grabTxt'); if(g)g.textContent='GRAB LOOT — '+Math.max(0,c.lootGrab.left).toFixed(1)+'s';
    if(c.lootGrab.left<=0) nextEnemyOrEnd();
  }

  // ---- AUTOMATION: run the raid loop for you ----
  if(G.raid && G.raid.alive){
    const cc=G.raid.combat;
    if(cc && !cc.over && !cc.lootGrab){
      if(autoLvl('reload')>0 && G.raid.mag[G.gear.active]<=0){
        cc.reloadT=(cc.reloadT||0)+dt; if(cc.reloadT>=0.8){ cc.reloadT=0; reloadActive(); }
      }
    } else if(cc && cc.lootGrab && autoLvl('loot')>0){
      cc.lootGrab.autoT=(cc.lootGrab.autoT||0)+dt; if(cc.lootGrab.autoT>=0.3){ cc.lootGrab.autoT=0; autoGrabNext(); }
    } else if(!cc){
      if(autoLvl('extract')>0 && G.raid.carriedVal>0 && (currentDeathChance()*100>=G.autoExtractRisk || carriedPoints()>=carryCapacity())){
        extract();
      } else if(autoLvl('scav')>0 && G.raid.scavCooldown<=0){
        G.raid.autoScavT=(G.raid.autoScavT||0)+dt;
        if(G.raid.autoScavT>=autoScavInterval()){ G.raid.autoScavT=0; scavenge(); }
      }
    }
  }

  let changed=false;
  for(const r of G.raiders){ if(r.status==='raiding'&&now>=r.returnAt){ resolveRaider(r); changed=true; } }
  if(processBase(now)) changed=true;
  const baseOpen=!!document.getElementById('base-ov');
  if(baseOpen) updateBaseTimers(now);   // live countdowns without rebuilding (keeps dropdowns intact)
  if(!G.raid){
    if(changed){ baseOpen?openBase():render(); }
    else if(!baseOpen && (!tick._last || now-tick._last>1000)){ tick._last=now; if(!document.querySelector('.overlay')) renderHub(); }
  }
  requestAnimationFrame(tick);
}

/* ============================================================
   BOOT
   ============================================================ */
load();
initTraders();
render();
requestAnimationFrame(tick);
setInterval(save,5000);
window.addEventListener('beforeunload',save);
</script>
