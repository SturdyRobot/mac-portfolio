# Cloudflare Worker config for scope-proxy.
# Deploy with:  npx wrangler deploy   (run from this folder)
#
# The Groq key is NEVER here — it's a secret:
#   npx wrangler secret put GROQ_API_KEY

name = "scope-proxy"
main = "scope-proxy.js"
compatibility_date = "2025-01-01"

[vars]
ALLOW_ORIGIN = "https://sturdyrobot.io,https://www.sturdyrobot.io"
GROQ_MODEL = "llama-3.3-70b-versatile"
RATE_MAX = "5"

# Per-IP rate-limit counter.
[[kv_namespaces]]
binding = "SCOPE_KV"
id = "15c9580c103b4cf68112656a65926be0"
